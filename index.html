<script>
// Charger les scripts dans l'ordre, en série, pour garantir que tout soit prêt
function loadScript(src) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = function() { reject(new Error('Echec chargement: ' + src)); };
    document.head.appendChild(s);
  });
}

async function boot() {
  try {
    await loadScript('https://unpkg.com/react@18/umd/react.production.min.js');
    await loadScript('https://unpkg.com/react-dom@18/umd/react-dom.production.min.js');
    await loadScript('https://unpkg.com/prop-types@15.8.1/prop-types.min.js');
    await loadScript('https://unpkg.com/recharts@2.10.0/umd/Recharts.js');
    await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js');
    await loadScript('https://unpkg.com/@babel/standalone@7.23.6/babel.min.js');
    
    // Une fois tout chargé, transformer et exécuter le code
    var code = document.getElementById('app-code').textContent;
    var transformed = Babel.transform(code, { presets: ['react'] }).code;
    eval(transformed);
  } catch(e) {
    document.getElementById('root').innerHTML = '<div style="padding:40px;color:#dc2626;font-family:sans-serif"><h2>Erreur de chargement</h2><p>' + e.message + '</p></div>';
  }
}
boot();
</script>

// Mention adaptée au barème (les seuils sont proportionnels : /10 → moitié des seuils /20)
const MENTION = (v, bareme=20) => {
  const n=parseFloat(v); const f=bareme/20;
  if(n>=16*f) return{t:"Très Bien",c:"#10b981",bg:"#d1fae5"};
  if(n>=14*f) return{t:"Bien",c:"#3b82f6",bg:"#dbeafe"};
  if(n>=12*f) return{t:"Assez Bien",c:"#8b5cf6",bg:"#ede9fe"};
  if(n>=10*f) return{t:"Passable",c:"#f59e0b",bg:"#fef3c7"};
  return{t:"Insuffisant",c:"#ef4444",bg:"#fee2e2"};
};
const fmtMoney = (v,d="GNF") => !v&&v!==0?"—":Number(v).toLocaleString("fr-FR")+" "+(DEVISES[d]?.symbole||d);
const calcMoy = (notes,mats,periode) => {
  let tot=0,cf=0;
  mats.forEach(m=>{ const n=periode?notes?.[periode]?.[m.id]:notes?.[m.id]; if(n!=null&&n!==""){tot+=parseFloat(n)*m.coefficient;cf+=m.coefficient;} });
  return cf>0?(tot/cf).toFixed(2):"—";
};
const periodesList = sys => sys==="semestre"?["Semestre 1","Semestre 2"]:["Trimestre 1","Trimestre 2","Trimestre 3"];

// ── PAIEMENTS : échéances ─────────────────────────────────────────────────────
// Mois de l'année scolaire guinéenne (octobre → juin/juillet)
const MOIS_SCOLAIRES = ["Octobre","Novembre","Décembre","Janvier","Février","Mars","Avril","Mai","Juin","Juillet"];
// Renvoie la liste des échéances selon le mode de l'établissement
const echeancesList = (etab={}) => {
  if((etab.mode_paiement||"mensualite")==="tranche"){
    const n=parseInt(etab.nb_tranches)||3;
    return Array.from({length:n},(_,i)=>`Tranche ${i+1}`);
  }
  // mensualité : utilise la liste personnalisée si définie, sinon les mois standard
  if(etab.mois_personnalises) return etab.mois_personnalises.split(",").map(s=>s.trim()).filter(Boolean);
  return MOIS_SCOLAIRES;
};
// Total des frais annuels d'un élève (sa valeur propre, sinon le défaut de l'école)
// Cascade des frais : valeur de l'élève → sinon de sa classe → sinon défaut école
const fraisAnnuelEleve = (eleve={},etab={},classe=null) => {
  const v=eleve.frais_annuel; if(v!=null&&v!=="") return parseFloat(v)||0;
  const fc=classe?.frais_annuel_classe; if(fc!=null&&fc!=="") return parseFloat(fc)||0;
  return parseFloat(etab.frais_annuel_defaut)||0;
};
// Frais d'inscription : élève → classe → défaut école
const fraisInscEleve = (eleve={},etab={},classe=null) => {
  const v=eleve.frais_inscription_eleve; if(v!=null&&v!=="") return parseFloat(v)||0;
  const fc=classe?.frais_inscription_classe; if(fc!=null&&fc!=="") return parseFloat(fc)||0;

};

// ── ONBOARDING ────────────────────────────────────────────────────────────────
function Onboarding({codeActivation,onDone}) {
  const [step,setStep]=useState(1);
  const [ecole,setEcole]=useState({nom:"",devise:"GNF",annee:"",adresse:"",telephone:"",email:"",codeMEN:"",prefixe:"",systeme:"trimestre",devise_txt:"",fraisInscription:"",mensualite:""});
  const [admin,setAdmin]=useState({nom:"",prenom:"",identifiant:"",password:"",confirm:""});
  const [err,setErr]=useState("");const [loading,setLoading]=useState(false);

  const finish=async()=>{
    if(!admin.nom||!admin.identifiant||!admin.password)return setErr("Tous les champs sont requis.");
    if(admin.password!==admin.confirm)return setErr("Mots de passe différents.");
    setLoading(true);
    try {
      // Sauvegarder établissement
      const {data:etabData,error:etabErr}=await sb.from("etablissements").upsert({...ecole,code_activation:codeActivation,created_at:new Date().toISOString()}).select().single();
      if(etabErr)throw etabErr;
      // Sauvegarder admin
      const {error:userErr}=await sb.from("utilisateurs").insert({nom:admin.nom,prenom:admin.prenom,identifiant:admin.identifiant,password:admin.password,role:"Administrateur",etablissement_id:etabData.id});
      if(userErr)throw userErr;
      onDone(etabData,{...admin,role:"Administrateur",etablissement_id:etabData.id});
    } catch(e){setErr("Erreur de connexion : "+e.message);}
    setLoading(false);
  };

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1a56db)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Plus Jakarta Sans',sans-serif",padding:16}}>
      <div style={{background:"#fff",borderRadius:22,padding:38,width:560,maxWidth:"100%",boxShadow:"0 32px 80px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",gap:8,marginBottom:28}}>
          {[{n:1,l:"École"},{n:2,l:"Admin"}].map((s,i,arr)=>(
            <div key={s.n} style={{display:"flex",alignItems:"center",flex:i<arr.length-1?1:"none",gap:7}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:step>=s.n?"#1a56db":"#e2e8f0",color:step>=s.n?"#fff":"#94a3b8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>{s.n}</div>
              <span style={{fontSize:12,fontWeight:600,color:step>=s.n?"#1a56db":"#94a3b8"}}>{s.l}</span>
              {i<arr.length-1&&<div style={{flex:1,height:2,background:step>s.n?"#1a56db":"#e2e8f0",borderRadius:2}}/>}
            </div>
          ))}
        </div>
        {step===1?(
          <>
            <div style={{marginBottom:20}}><h2 style={{margin:"0 0 3px",fontSize:19,fontWeight:900,color:"#0f172a"}}>Votre établissement 🏫</h2><p style={{margin:0,color:"#64748b",fontSize:13}}>Ces infos apparaîtront sur les bulletins et reçus.</p></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
              <div style={{gridColumn:"1/-1"}}><Inp label="Nom de l'établissement *" value={ecole.nom} onChange={e=>setEcole(f=>({...f,nom:e.target.value}))} placeholder="Collège Moderne de..."/></div>
              <Inp label="Devise / Slogan" value={ecole.devise_txt} onChange={e=>setEcole(f=>({...f,devise_txt:e.target.value}))} placeholder="L'excellence avant tout"/>
              <Inp label="Année scolaire *" value={ecole.annee} onChange={e=>setEcole(f=>({...f,annee:e.target.value}))} placeholder="2026-2027"/>
              <Slt label="Devise monétaire" value={ecole.devise} onChange={e=>setEcole(f=>({...f,devise:e.target.value}))} opts={[{v:"GNF",l:"GNF — Franc Guinéen"},{v:"XOF",l:"FCFA — Franc CFA"}]}/>
              <Slt label="Système de notation" value={ecole.systeme} onChange={e=>setEcole(f=>({...f,systeme:e.target.value}))} opts={[{v:"trimestre",l:"Trimestriel (3 périodes)"},{v:"semestre",l:"Semestriel (2 périodes)"}]}/>
              <Inp label="Adresse" value={ecole.adresse} onChange={e=>setEcole(f=>({...f,adresse:e.target.value}))} placeholder="Commune, Ville"/>
              <Inp label="Téléphone" value={ecole.telephone} onChange={e=>setEcole(f=>({...f,telephone:e.target.value}))} placeholder="+224 XXX XXX XXX"/>
              <div style={{gridColumn:"1/-1"}}><Inp label="Email" value={ecole.email} onChange={e=>setEcole(f=>({...f,email:e.target.value}))} placeholder="direction@ecole.gn"/></div>
              <Inp label="Code MEN" value={ecole.codeMEN} onChange={e=>setEcole(f=>({...f,codeMEN:e.target.value}))} placeholder="GN 12 345 678"/>
              <Inp label="Préfixe matricule" value={ecole.prefixe} onChange={e=>setEcole(f=>({...f,prefixe:e.target.value}))} placeholder="CMC"/>
              <Inp label="Frais inscription (défaut)" type="number" value={ecole.fraisInscription} onChange={e=>setEcole(f=>({...f,fraisInscription:e.target.value}))} placeholder="500000"/>
              <Inp label="Mensualité (défaut)" type="number" value={ecole.mensualite} onChange={e=>setEcole(f=>({...f,mensualite:e.target.value}))} placeholder="150000"/>
            </div>
          </>
        ):(
          <>
            <div style={{marginBottom:20}}><h2 style={{margin:"0 0 3px",fontSize:19,fontWeight:900,color:"#0f172a"}}>Compte administrateur 🔐</h2><p style={{margin:0,color:"#64748b",fontSize:13}}>Accès complet à toutes les fonctionnalités.</p></div>

              <Inp label="Prénom" value={admin.prenom} onChange={e=>setAdmin(f=>({...f,prenom:e.target.value}))}/>
              <div style={{gridColumn:"1/-1"}}><Inp label="Identifiant *" value={admin.identifiant} onChange={e=>setAdmin(f=>({...f,identifiant:e.target.value}))} placeholder="admin.directeur"/></div>
              <Lbl t="Mot de passe *"><input type="password" value={admin.password} onChange={e=>setAdmin(f=>({...f,password:e.target.value}))} style={iSt()}/></Lbl>
              <Lbl t="Confirmer *"><input type="password" value={admin.confirm} onChange={e=>setAdmin(f=>({...f,confirm:e.target.value}))} style={iSt()}/></Lbl>
            </div>
          </>
        )}
        {err&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:9,padding:"9px 13px",color:"#dc2626",fontSize:12,margin:"10px 0"}}>{err}</div>}
        <div style={{display:"flex",justifyContent:"space-between",marginTop:10}}>
          {step===2?<Btn ch="← Retour" v="ghost" onClick={()=>setStep(1)}/>:<div/>}
          {step===1?<Btn ch="Suivant →" v="primary" onClick={()=>{if(!ecole.nom||!ecole.annee){setErr("Nom et année obligatoires.");return;}setErr("");setStep(2);}} s={{padding:"11px 26px"}}/>
          :<Btn ch={loading?"Création...":"Terminer ✓"} v="primary" onClick={finish} disabled={loading} s={{padding:"11px 26px"}}/>}
        </div>
      </div>
    </div>
  );
}

// ── HOOK SUPABASE DATA ────────────────────────────────────────────────────────
function useSupabaseData(etablissementId) {
  const [data,setData]=useState({classes:[],matieres:[],eleves:[],utilisateurs:[],paiements:[],presences:[],messages:[],compositions:[],professeurs:[],salaires:[],absences_prof:[],emploi_temps:[],conversations:[],titres_jour:[]});
  const [syncStatus,setSyncStatus]=useState("online");
  const [toast,setToast]=useState(null);

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};

  const load=useCallback(async()=>{
    if(!etablissementId)return;
    setSyncStatus("syncing");
    try {
      const [cls,mats,elvs,usrs,pays,pres,msgs,comps,profs,sals,absp,edt,convs,tj]=await Promise.all([
        sb.from("classes").select("*").eq("etablissement_id",etablissementId).order("nom"),
        sb.from("matieres").select("*").eq("etablissement_id",etablissementId).order("nom"),
        sb.from("eleves").select("*").eq("etablissement_id",etablissementId).order("nom"),
        sb.from("utilisateurs").select("*").eq("etablissement_id",etablissementId).order("nom"),
        sb.from("paiements").select("*").eq("etablissement_id",etablissementId).order("created_at",{ascending:false}),
        sb.from("presences").select("*").eq("etablissement_id",etablissementId),
        sb.from("messages").select("*").eq("etablissement_id",etablissementId).order("created_at"),
        sb.from("compositions").select("*").eq("etablissement_id",etablissementId).order("created_at",{ascending:false}),
        sb.from("professeurs").select("*").eq("etablissement_id",etablissementId).order("nom"),
        sb.from("salaires").select("*").eq("etablissement_id",etablissementId).order("created_at",{ascending:false}),
        sb.from("absences_prof").select("*").eq("etablissement_id",etablissementId),
        sb.from("emploi_temps").select("*").eq("etablissement_id",etablissementId),
        sb.from("conversations").select("*").eq("etablissement_id",etablissementId).order("created_at"),
        sb.from("titres_jour").select("*").eq("etablissement_id",etablissementId).order("created_at",{ascending:false}),
      ]);
      setData({
        classes:cls.data||[],matieres:mats.data||[],eleves:elvs.data||[],
        utilisateurs:usrs.data||[],paiements:pays.data||[],presences:pres.data||[],
        messages:msgs.data||[],compositions:comps.data||[],
        professeurs:profs.data||[],salaires:sals.data||[],absences_prof:absp.data||[],
        emploi_temps:edt.data||[],conversations:convs.data||[],titres_jour:tj.data||[]
      });
      setSyncStatus("online");
    } catch(e){setSyncStatus("offline");showToast("Erreur de synchronisation","error");}
  },[etablissementId]);

  useEffect(()=>{load();},[load]);

  // Realtime subscriptions
  useEffect(()=>{
    if(!etablissementId)return;
    const tables=["classes","matieres","eleves","paiements","presences","messages","compositions"];
    const channels=tables.map(t=>sb.channel(`${t}_${etablissementId}`).on("postgres_changes",{event:"*",schema:"public",table:t,filter:`etablissement_id=eq.${etablissementId}`},()=>{setSyncStatus("syncing");load();}).subscribe());
    return()=>channels.forEach(c=>sb.removeChannel(c));
  },[etablissementId,load]);

  // CRUD operations
  const ops = {
    updateEtab: async(id,form)=>{const{data:d,error}=await sb.from("etablissements").update(form).eq("id",id).select().single();if(!error){showToast("Établissement mis à jour");return d;}else{showToast(error.message,"error");return null;}},
    addClass: async(form)=>{const f={...form,effectif:form.effectif===""?null:form.effectif};const{error}=await sb.from("classes").insert({...f,etablissement_id:etablissementId});if(!error){load();showToast("Classe créée");}else showToast(error.message,"error");},
    updateClass: async(id,form)=>{const f={...form,effectif:form.effectif===""?null:form.effectif};const{error}=await sb.from("classes").update(f).eq("id",id);if(!error){load();showToast("Classe modifiée");}else showToast(error.message,"error");},
    deleteClass: async(id)=>{await sb.from("classes").delete().eq("id",id);load();showToast("Classe supprimée");},

    addMat: async(form)=>{const{error}=await sb.from("matieres").insert({...form,etablissement_id:etablissementId});if(!error){load();showToast("Matière créée");}else showToast(error.message,"error");},
    updateMat: async(id,form)=>{const{error}=await sb.from("matieres").update(form).eq("id",id);if(!error){load();showToast("Matière modifiée");}else showToast(error.message,"error");},
    deleteMat: async(id)=>{await sb.from("matieres").delete().eq("id",id);load();showToast("Matière supprimée");},

    addEleve: async(form)=>{const count=data.eleves.length;const {prefixe,...rest}=form;const mat=`${prefixe||"EL"}-${String(count+1).padStart(4,"0")}`;const{data:created,error}=await sb.from("eleves").insert({...rest,matricule:mat,etablissement_id:etablissementId,inscription_date:TODAY,notes:{}}).select().single();if(!error){load();showToast("Élève inscrit");return created;}else{showToast(error.message,"error");return null;}},
    updateEleve: async(id,form)=>{const{error}=await sb.from("eleves").update(form).eq("id",id);if(!error){load();showToast("Élève modifié");}else showToast(error.message,"error");},
    deleteEleve: async(id)=>{await sb.from("eleves").delete().eq("id",id);load();showToast("Élève supprimé");},

    saveNotes: async(eleveId,periode,matiereId,note)=>{
      const eleve=data.eleves.find(e=>e.id===eleveId);
      if(!eleve)return;
      const notes={...(eleve.notes||{}),[periode]:{...(eleve.notes?.[periode]||{}),[matiereId]:parseFloat(note)||0}};
      const{error}=await sb.from("eleves").update({notes}).eq("id",eleveId);
      if(error)showToast(error.message,"error");
    },
    saveAllNotes: async(updates)=>{
      setSyncStatus("syncing");
      await Promise.all(updates.map(({id,notes})=>sb.from("eleves").update({notes}).eq("id",id)));
      load();showToast("Notes enregistrées");
    },

    addPaiement: async(form)=>{const{data:created,error}=await sb.from("paiements").insert({...form,etablissement_id:etablissementId,recu:`REC-${String(data.paiements.length+1).padStart(4,"0")}`,created_at:new Date().toISOString()}).select().single();if(!error){load();showToast("Paiement enregistré");return created;}else{showToast(error.message,"error");return null;}},
    deletePaiement: async(id)=>{await sb.from("paiements").delete().eq("id",id);load();showToast("Paiement supprimé");},

    addProf: async(form)=>{const{error}=await sb.from("professeurs").insert({...form,etablissement_id:etablissementId});if(!error){load();showToast("Professeur ajouté");}else showToast(error.message,"error");},
    updateProf: async(id,form)=>{const{error}=await sb.from("professeurs").update(form).eq("id",id);if(!error){load();showToast("Professeur modifié");}else showToast(error.message,"error");},
    deleteProf: async(id)=>{await sb.from("professeurs").delete().eq("id",id);load();showToast("Professeur supprimé");},
    addSalaire: async(form)=>{const{data:created,error}=await sb.from("salaires").insert({...form,etablissement_id:etablissementId,recu:`SAL-${String((data.salaires?.length||0)+1).padStart(4,"0")}`,created_at:new Date().toISOString()}).select().single();if(!error){load();showToast("Versement enregistré");return created;}else{showToast(error.message,"error");return null;}},
    deleteSalaire: async(id)=>{await sb.from("salaires").delete().eq("id",id);load();showToast("Versement supprimé");},
    setProfPresence: async(profId,date,statut,motif)=>{
      await sb.from("absences_prof").delete().match({prof_id:profId,date,etablissement_id:etablissementId});
      if(statut==="absent"){await sb.from("absences_prof").insert({prof_id:profId,date,motif:motif||"",etablissement_id:etablissementId});}
      load();
    },
    addCreneau: async(form)=>{const{error}=await sb.from("emploi_temps").insert({...form,etablissement_id:etablissementId});if(!error){load();showToast("Créneau ajouté");}else showToast(error.message,"error");},
    updateCreneau: async(id,form)=>{const{error}=await sb.from("emploi_temps").update(form).eq("id",id);if(!error){load();showToast("Créneau modifié");}else showToast(error.message,"error");},
    deleteCreneau: async(id)=>{await sb.from("emploi_temps").delete().eq("id",id);load();showToast("Créneau supprimé");},

    togglePresence: async(eleveId,classeId,present)=>{
      await sb.from("presences").delete().match({eleve_id:eleveId,classe_id:classeId,date:TODAY,etablissement_id:etablissementId});
      await sb.from("presences").insert({eleve_id:eleveId,classe_id:classeId,date:TODAY,present,etablissement_id:etablissementId});
      load();
    },

    sendMessage: async(auteur,role,texte,conversation="general",auteur_id=null,fichiers=[])=>{const{error}=await sb.from("messages").insert({auteur,role,texte,conversation,auteur_id,fichiers,etablissement_id:etablissementId,created_at:new Date().toISOString()});if(error)showToast(error.message,"error");else load();},
    uploadFichier: async(file)=>{
      try{
        const ext=(file.name.split(".").pop()||"bin").toLowerCase();
        const path=`${etablissementId}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
        const{error}=await sb.storage.from("fichiers").upload(path,file,{cacheControl:"3600",upsert:false});
        if(error){showToast("Échec envoi fichier : "+error.message,"error");return null;}
        const{data:pub}=sb.storage.from("fichiers").getPublicUrl(path);
        return {url:pub.publicUrl,nom:file.name,type:file.type||""};
      }catch(e){showToast("Erreur fichier : "+e.message,"error");return null;}
    },
    addGroupe: async(nom,membres)=>{const{data:created,error}=await sb.from("conversations").insert({nom,membres,etablissement_id:etablissementId,created_at:new Date().toISOString()}).select().single();if(!error){load();showToast("Groupe créé");return created;}else{showToast(error.message,"error");return null;}},
    deleteGroupe: async(id)=>{await sb.from("conversations").delete().eq("id",id);load();showToast("Groupe supprimé");},
    setTitreJour: async(classe_id,date,titre,auteur)=>{
      await sb.from("titres_jour").delete().match({classe_id,date,etablissement_id:etablissementId});
      if(titre&&titre.trim()){await sb.from("titres_jour").insert({classe_id,date,titre:titre.trim(),auteur,etablissement_id:etablissementId,created_at:new Date().toISOString()});}
      load();showToast("Leçon du jour enregistrée");
    },

    addComp: async(form)=>{const{error}=await sb.from("compositions").insert({...form,etablissement_id:etablissementId,created_at:new Date().toISOString()});if(!error){load();showToast("Composition créée");}else showToast(error.message,"error");},
    deleteComp: async(id)=>{await sb.from("compositions").delete().eq("id",id);load();showToast("Composition supprimée");},

    addUser: async(form)=>{const{error}=await sb.from("utilisateurs").insert({...form,etablissement_id:etablissementId});if(!error){load();showToast("Utilisateur créé");}else showToast(error.message,"error");},
    updateUser: async(id,form)=>{const{error}=await sb.from("utilisateurs").update(form).eq("id",id);if(!error){load();showToast("Utilisateur modifié");}else showToast(error.message,"error");},
    deleteUser: async(id)=>{await sb.from("utilisateurs").delete().eq("id",id);load();showToast("Utilisateur supprimé");},
  };

  return{data,syncStatus,toast,ops,reload:load};
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({data,etab,setPage,currentUser}) {
  const [now,setNow]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return ()=>clearInterval(t);},[]);
  const JOURS_FR=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
  const MOIS_FR=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
  const jourNom=JOURS_FR[now.getDay()];
  const dateStr=`${jourNom} ${now.getDate()} ${MOIS_FR[now.getMonth()]} ${now.getFullYear()}`;
  const heureStr=now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  const isProf=currentUser?.role==="Professeur";
  const autorisees=Array.isArray(currentUser?.matieres_autorisees)?currentUser.matieres_autorisees:[];
  const coursDuJour=(data.emploi_temps||[])
    .filter(c=>c.jour===jourNom)
    .filter(c=>!isProf||autorisees.includes(c.matiere_id))
    .sort((a,b)=>(a.debut||"").localeCompare(b.debut||""));
  const matNom=id=>data.matieres.find(m=>m.id===id)?.nom||"—";
  const classeNom=id=>data.classes.find(c=>c.id===id)?.nom||"—";
  const profNom=id=>{const p=data.professeurs?.find(x=>x.id===id);return p?`${p.prenom} ${p.nom}`:"";};
  const devise=etab.devise||"GNF";
  const periodes=periodesList(etab.systeme);
  const lastP=periodes[periodes.length-1];
  if(data.eleves.length===0) return(
    <div>
      <SHdr title={`Bienvenue 👋`} sub={etab.nom}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:12}}>
        {[{icon:"🏫",l:"Classes",p:"classes",c:"#3b82f6"},{icon:"📖",l:"Matières",p:"matieres",c:"#8b5cf6"},{icon:"👨‍🎓",l:"Élèves",p:"eleves",c:"#10b981"},{icon:"👤",l:"Utilisateurs",p:"utilisateurs",c:"#f59e0b"}].map(item=>(
          <div key={item.p} onClick={()=>setPage(item.p)} style={{background:"#fff",borderRadius:14,padding:22,border:"2px dashed #e2e8f0",textAlign:"center",cursor:"pointer",transition:"all 0.2s"}} onMouseOver={e=>{e.currentTarget.style.borderColor=item.c;e.currentTarget.style.background=item.c+"0a";}} onMouseOut={e=>{e.currentTarget.style.borderColor="#e2e8f0";e.currentTarget.style.background="#fff";}}>
            <div style={{fontSize:30,marginBottom:8}}>{item.icon}</div>
            <div style={{fontSize:13,fontWeight:700,color:"#475569"}}>{item.l}</div>
          </div>
        ))}
      </div>
    </div>
  );
  const moyennes=data.eleves.map(e=>{const m=calcMoy(e.notes||{},data.matieres,lastP);return m!=="—"?parseFloat(m):null;}).filter(Boolean);
  const moyGlobale=moyennes.length?(moyennes.reduce((a,b)=>a+b,0)/moyennes.length).toFixed(1):"—";
  const tauxReussite=moyennes.length?Math.round(moyennes.filter(m=>m>=10).length/moyennes.length*100):0;
  const totalPaie=data.paiements.reduce((s,p)=>s+(parseFloat(p.montant)||0),0);
  const absToday=data.presences.filter(p=>p.date===TODAY&&!p.present).length;
  const repartition=[{name:"Très Bien",v:moyennes.filter(m=>m>=16).length,c:"#10b981"},{name:"Bien",v:moyennes.filter(m=>m>=14&&m<16).length,c:"#3b82f6"},{name:"Assez Bien",v:moyennes.filter(m=>m>=12&&m<14).length,c:"#8b5cf6"},{name:"Passable",v:moyennes.filter(m=>m>=10&&m<12).length,c:"#f59e0b"},{name:"Insuffisant",v:moyennes.filter(m=>m<10).length,c:"#ef4444"}].filter(d=>d.v>0);
  const matiereData=data.matieres.map(m=>({name:m.nom.split(" ")[0].slice(0,7),moy:+(data.eleves.reduce((acc,e)=>acc+(parseFloat(e.notes?.[lastP]?.[m.id])||0),0)/data.eleves.length).toFixed(1)}));
  const countCycle=cyc=>data.eleves.filter(e=>{const c=data.classes.find(x=>x.id===e.classe_id);return (c?.niveau||"Primaire")===cyc;}).length;
  const genreCycle=(cyc,g)=>data.eleves.filter(e=>{const c=data.classes.find(x=>x.id===e.classe_id);return (c?.niveau||"Primaire")===cyc&&e.genre===g;}).length;
  const totG=data.eleves.filter(e=>e.genre==="M").length;
  const totF=data.eleves.filter(e=>e.genre==="F").length;
  const cycleInfo=[{cyc:"Maternelle",emoji:"🟨",c:"#eab308",bg:"#fefce8"},{cyc:"Primaire",emoji:"🟦",c:"#3b82f6",bg:"#eff6ff"},{cyc:"Collège",emoji:"🟪",c:"#8b5cf6",bg:"#f5f3ff"},{cyc:"Lycée",emoji:"🟩",c:"#10b981",bg:"#ecfdf5"}];
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:12}}>
        <div><h2 style={{margin:0,fontSize:22,fontWeight:800,color:"#0f172a",fontFamily:"'Sora',sans-serif",letterSpacing:-0.5}}>Tableau de bord 📊</h2><p style={{margin:"5px 0 0",color:"#64748b",fontSize:13}}>{etab.annee||""} · {etab.systeme==="semestre"?"Semestriel":"Trimestriel"} · Temps réel</p></div>
        <div style={{background:"linear-gradient(135deg,#0f172a,#1a56db)",borderRadius:15,padding:"12px 20px",color:"#fff",textAlign:"right",boxShadow:"0 8px 22px -8px rgba(26,86,219,.6)"}}>
          <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.75)",textTransform:"capitalize"}}>{dateStr}</div>
          <div style={{fontSize:26,fontWeight:900,fontFamily:"'Sora',sans-serif",letterSpacing:1,lineHeight:1.1}}>{heureStr}</div>
        </div>
      </div>
      {/* Emploi du temps du jour */}
      <Card s={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontWeight:800,fontSize:14,color:"#0f172a",fontFamily:"'Sora',sans-serif"}}>🗓️ Cours du jour — {jourNom}</div>
          <span style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>{coursDuJour.length} cours{isProf?" (mes matières)":""}</span>
        </div>
        {coursDuJour.length===0?<div style={{fontSize:12,color:"#94a3b8",textAlign:"center",padding:"14px 0"}}>{jourNom==="Dimanche"?"Repos dominical 😌":"Aucun cours programmé aujourd'hui."}</div>:(
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {coursDuJour.map(c=>(
              <div key={c.id} style={{display:"flex",alignItems:"center",gap:12,padding:"9px 13px",background:"#f8fafc",borderRadius:10,borderLeft:"3px solid #1a56db"}}>
                <div style={{fontSize:12,fontWeight:800,color:"#1a56db",minWidth:95}}>{c.debut} - {c.fin}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{matNom(c.matiere_id)} <span style={{fontWeight:600,color:"#94a3b8"}}>· {classeNom(c.classe_id)}</span></div>
                  <div style={{fontSize:11,color:"#64748b"}}>{profNom(c.prof_id)?`👨‍🏫 ${profNom(c.prof_id)}`:""}{c.salle?`${profNom(c.prof_id)?" · ":""}📍 ${c.salle}`:""}</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </Card>
      {/* Répartition garçons / filles */}
      {(totG+totF)>0&&<div style={{display:"flex",gap:13,marginBottom:14,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:150,background:"linear-gradient(135deg,#eff6ff,#fff)",borderRadius:16,padding:"16px 20px",border:"1px solid #3b82f622"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:26,height:26,borderRadius:8,background:"#2563eb",color:"#fff",fontWeight:900,fontSize:14}}>M</span><span style={{fontSize:12,fontWeight:800,color:"#2563eb"}}>MASCULIN</span></div>
          <div style={{fontSize:30,fontWeight:900,color:"#0f172a"}}>{totG}<span style={{fontSize:13,color:"#94a3b8",fontWeight:600}}> · {data.eleves.length?Math.round(totG/data.eleves.length*100):0}%</span></div>
        </div>
        <div style={{flex:1,minWidth:150,background:"linear-gradient(135deg,#fdf2f8,#fff)",borderRadius:16,padding:"16px 20px",border:"1px solid #db277722"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:26,height:26,borderRadius:8,background:"#db2777",color:"#fff",fontWeight:900,fontSize:14}}>F</span><span style={{fontSize:12,fontWeight:800,color:"#db2777"}}>FÉMININ</span></div>
          <div style={{fontSize:30,fontWeight:900,color:"#0f172a"}}>{totF}<span style={{fontSize:13,color:"#94a3b8",fontWeight:600}}> · {data.eleves.length?Math.round(totF/data.eleves.length*100):0}%</span></div>
        </div>
      </div>}
      {/* Répartition des effectifs par cycle */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:13,marginBottom:14}}>
        {cycleInfo.map(ci=>{const n=countCycle(ci.cyc);const pct=data.eleves.length?Math.round(n/data.eleves.length*100):0;const g=genreCycle(ci.cyc,"M");const f=genreCycle(ci.cyc,"F");return(
          <div key={ci.cyc} onClick={()=>setPage("eleves")} style={{background:`linear-gradient(135deg,${ci.bg},#ffffff)`,borderRadius:16,padding:"18px 20px",border:`1px solid ${ci.c}22`,cursor:"pointer",position:"relative",overflow:"hidden"}}>
            <div style={{fontSize:12,fontWeight:800,color:ci.c,letterSpacing:.3}}>{ci.emoji} {ci.cyc.toUpperCase()}</div>
            <div style={{fontSize:34,fontWeight:900,color:"#0f172a",lineHeight:1.1,marginTop:6}}>{n}</div>
            <div style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>élève(s) · {pct}%</div>
            {(g+f)>0&&<div style={{display:"flex",gap:6,marginTop:5}}><span style={{fontSize:11,fontWeight:700,color:"#2563eb",background:"#eff6ff",borderRadius:6,padding:"1px 7px"}}>M : {g}</span><span style={{fontSize:11,fontWeight:700,color:"#db2777",background:"#fdf2f8",borderRadius:6,padding:"1px 7px"}}>F : {f}</span></div>}
            <div style={{position:"absolute",right:-10,bottom:-10,fontSize:64,opacity:0.06}}>{ci.emoji}</div>
          </div>
        );})}
      </div>
      <div style={{display:"flex",gap:13,flexWrap:"wrap",marginBottom:20}}>
        <StatCard icon="👨‍🎓" label="Total élèves" value={data.eleves.length} sub={`${data.classes.length} classes`} color="#3b82f6" onClick={()=>setPage("eleves")}/>
        <StatCard icon="📈" label="Moy. générale" value={moyGlobale} sub={lastP} color="#10b981"/>
        <StatCard icon="🏆" label="Taux réussite" value={`${tauxReussite}%`} color="#f59e0b"/>
        <StatCard icon="💰" label="Paiements" value={fmtMoney(totalPaie,devise)} color="#8b5cf6" onClick={()=>setPage("paiements")}/>
        {absToday>0&&<StatCard icon="⚠️" label="Absents auj." value={absToday} color="#ef4444" onClick={()=>setPage("presences")}/>}
      </div>
      {moyennes.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
          <Card><div style={{fontWeight:700,fontSize:13,color:"#0f172a",marginBottom:14}}>Moyennes par matière — {lastP}</div>
            <ResponsiveContainer width="100%" height={170}><BarChart data={matiereData}><CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/><XAxis dataKey="name" tick={{fontSize:10}}/><YAxis domain={[0,20]} tick={{fontSize:10}}/><Tooltip/><Bar dataKey="moy" fill="#1a56db" radius={[5,5,0,0]}/></BarChart></ResponsiveContainer>
          </Card>
          <Card><div style={{fontWeight:700,fontSize:13,color:"#0f172a",marginBottom:14}}>Répartition des mentions</div>
            <ResponsiveContainer width="100%" height={130}><PieChart><Pie data={repartition.map(r=>({name:r.name,value:r.v}))} cx="50%" cy="50%" outerRadius={60} dataKey="value">{repartition.map((r,i)=><Cell key={i} fill={r.c}/>)}</Pie><Tooltip/></PieChart></ResponsiveContainer>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>{repartition.map((r,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#64748b"}}><div style={{width:7,height:7,borderRadius:2,background:r.c}}/>{r.name} ({r.v})</div>)}</div>
          </Card>
        </div>
      )}
      {moyennes.length>0&&(
        <Card><div style={{fontWeight:700,fontSize:13,color:"#0f172a",marginBottom:12}}>🥇 Meilleurs élèves — {lastP}</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {data.eleves.map(e=>({...e,moy:parseFloat(calcMoy(e.notes||{},data.matieres,lastP))||0})).sort((a,b)=>b.moy-a.moy).slice(0,5).map((e,i)=>{
              const cl=data.classes.find(c=>c.id===e.classe_id);const m=MENTION(e.moy,baremeOf(cl?.niveau));
              return(<div key={e.id} style={{display:"flex",alignItems:"center",gap:11,padding:"9px 13px",borderRadius:10,background:i===0?"#fef9c3":"#f8fafc",border:i===0?"1px solid #fde047":"1px solid #f1f5f9"}}>
                <span style={{fontSize:16}}>{["🥇","🥈","🥉"][i]||`${i+1}.`}</span>
                <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>{e.prenom} {e.nom}</div><div style={{fontSize:11,color:"#94a3b8"}}>{cl?.nom} · {e.matricule}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:16,color:m.c}}>{e.moy.toFixed(2)}</div><span style={{background:m.bg,color:m.c,borderRadius:5,padding:"1px 7px",fontSize:10,fontWeight:700}}>{m.t}</span></div>
              </div>);
            })}
          </div>
        </Card>
      )}
    </div>
  );
}

// ── CLASSES ───────────────────────────────────────────────────────────────────
function Classes({data,ops,etab}) {
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({nom:"",niveau:"",niveau_detail:"",serie:"",effectif:"",frais_annuel_classe:"",frais_inscription_classe:""});
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const devise=etab?.devise||"GNF";
  const save=async()=>{
    if(!form.nom){setErr("Le nom est obligatoire.");return;}
    // Anti-doublon : même nom (insensible casse/espaces) dans le même cycle
    const norm=s=>(s||"").trim().toLowerCase();
    const doublon=data.classes.find(c=>c.id!==modal&&norm(c.nom)===norm(form.nom)&&(c.niveau||"")===(form.niveau||""));
    if(doublon){setErr(`Une classe "${form.nom}" existe déjà dans ${form.niveau||"ce niveau"}.`);return;}
    setErr("");setLoading(true);
    if(modal==="add")await ops.addClass(form);else await ops.updateClass(modal,form);
    setLoading(false);setModal(null);
  };
  // Suggère un nom à partir du niveau + série
  const suggereNom=(niveau_detail,serie)=>!niveau_detail?"":serie?`${niveau_detail} ${serie==="Scientifique"?"S":"L"}`:niveau_detail;
  const openNew=()=>{setErr("");setForm({nom:"",niveau:"",niveau_detail:"",serie:"",effectif:"",frais_annuel_classe:"",frais_inscription_classe:""});setModal("add");};
  return(
    <div>
      <SHdr title="Classes 🏫" sub={`${data.classes.length} classe(s)`} action={<Btn ch="+ Nouvelle classe" v="primary" onClick={openNew}/>}/>
      {data.classes.length===0?<Card><Empty icon="🏫" text="Créez votre première classe."/></Card>:(
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          {CYCLES.map(cyc=>{
            const classesCyc=data.classes.filter(c=>(c.niveau||"Primaire")===cyc);
            if(classesCyc.length===0)return null;
            return(<div key={cyc}>
              <div style={{fontSize:13,fontWeight:800,color:"#475569",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>{cyc==="Primaire"?"🟦":cyc==="Collège"?"🟪":"🟩"} {cyc}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(195px,1fr))",gap:13}}>
                {classesCyc.map(c=>(
                  <Card key={c.id}>
                    <div style={{fontSize:26,marginBottom:8}}>📓</div>
                    <div style={{fontWeight:800,fontSize:15,color:"#0f172a",marginBottom:3}}>{c.nom}</div>
                    <div style={{fontSize:12,color:"#64748b",marginBottom:6}}>{c.niveau_detail||c.niveau}{c.serie?` · ${c.serie}`:""}</div>
                    {(c.frais_annuel_classe||c.frais_inscription_classe)&&<div style={{fontSize:11,color:"#059669",fontWeight:600,marginBottom:10}}>💰 {c.frais_annuel_classe?fmtMoney(c.frais_annuel_classe,devise):"—"}/an</div>}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
                      <span style={{background:"#eff6ff",color:"#1a56db",borderRadius:7,padding:"3px 9px",fontSize:11,fontWeight:700}}>👤 {data.eleves.filter(e=>e.classe_id===c.id).length}</span>
                      <div style={{display:"flex",gap:5}}>
                        <button onClick={()=>{setErr("");setForm({nom:c.nom,niveau:c.niveau||"",niveau_detail:c.niveau_detail||"",serie:c.serie||"",effectif:c.effectif||"",frais_annuel_classe:c.frais_annuel_classe??"",frais_inscription_classe:c.frais_inscription_classe??""});setModal(c.id);}} style={{background:"#f1f5f9",border:"none",borderRadius:7,padding:"5px 9px",cursor:"pointer"}}>✏️</button>
                        <button onClick={()=>ops.deleteClass(c.id)} style={{background:"#fef2f2",border:"none",borderRadius:7,padding:"5px 9px",cursor:"pointer"}}>🗑️</button>
                      </div>
                    </div>
                  </Card>
                ))}
              </div>
            </div>);
          })}
        </div>
      )}
      {modal&&<Modal title={modal==="add"?"Nouvelle classe":"Modifier la classe"} onClose={()=>setModal(null)} w={540}>
        <Slt label="Cycle *" value={form.niveau} onChange={e=>{const niveau=e.target.value;setForm(f=>({...f,niveau,niveau_detail:"",serie:niveau==="Lycée"?f.serie:""}));}} opts={[{v:"",l:"— Choisir le cycle —"},...CYCLES.map(c=>({v:c,l:`${c} (noté sur ${baremeOf(c)})`}))]}/>
        {form.niveau&&<Slt label="Niveau *" value={form.niveau_detail} onChange={e=>{const nd=e.target.value;setForm(f=>({...f,niveau_detail:nd,nom:suggereNom(nd,f.serie)}));}} opts={[{v:"",l:"— Choisir le niveau —"},...(NIVEAUX_CYCLE[form.niveau]||[]).map(n=>({v:n,l:n}))]}/>}
        {form.niveau==="Lycée"&&<Slt label="Série *" value={form.serie} onChange={e=>{const s=e.target.value;setForm(f=>({...f,serie:s,nom:suggereNom(f.niveau_detail,s)}));}} opts={[{v:"",l:"— Choisir la série —"},...SERIES.map(s=>({v:s,l:s}))]}/>}
        <Inp label="Nom de la classe *" value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))} placeholder="Ex: 11ème S, 3ème A"/>
        {err&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:9,padding:"9px 13px",color:"#dc2626",fontSize:12,margin:"4px 0"}}>{err}</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 13px"}}>
          <Inp label={`Frais scolarité/an (${devise})`} type="number" value={form.frais_annuel_classe} onChange={e=>setForm(f=>({...f,frais_annuel_classe:e.target.value}))} placeholder={etab?.frais_annuel_defaut?`Défaut: ${etab.frais_annuel_defaut}`:"Vide = défaut école"}/>
          <Inp label={`Frais inscription (${devise})`} type="number" value={form.frais_inscription_classe} onChange={e=>setForm(f=>({...f,frais_inscription_classe:e.target.value}))} placeholder={etab?.fraisInscription?`Défaut: ${etab.fraisInscription}`:"Vide = défaut école"}/>
        </div>
        <Inp label="Effectif prévu" type="number" value={form.effectif} onChange={e=>setForm(f=>({...f,effectif:e.target.value}))}/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn ch="Annuler" v="ghost" onClick={()=>setModal(null)}/><Btn ch={loading?"...":"Enregistrer"} v="success" onClick={save} disabled={loading}/></div>
      </Modal>}
    </div>
  );
}

// ── MATIÈRES ──────────────────────────────────────────────────────────────────
function Matieres({data,ops}) {
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({nom:"",coefficient:1,enseignant:"",cycles:[]});
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const norm=s=>(s||"").trim().toLowerCase().replace(/\s+/g," ");
  const toggleCycle=cyc=>setForm(f=>({...f,cycles:(f.cycles||[]).includes(cyc)?f.cycles.filter(c=>c!==cyc):[...(f.cycles||[]),cyc]}));
  const save=async()=>{
    if(!form.nom)return;
    // Anti-doublon : même nom (insensible casse/espaces)
    const doublon=data.matieres.find(m=>m.id!==modal&&norm(m.nom)===norm(form.nom));
    if(doublon){setErr(`La matière "${form.nom}" existe déjà.`);return;}
    setErr("");setLoading(true);
    if(modal==="add")await ops.addMat(form);else await ops.updateMat(modal,form);
    setLoading(false);setModal(null);
  };
  const openNew=()=>{setErr("");setForm({nom:"",coefficient:1,enseignant:"",cycles:[]});setModal("add");};
  // Matières d'un cycle (celles dont cycles inclut cyc, ou sans cycle = toutes)
  const matCycle=cyc=>data.matieres.filter(m=>!m.cycles||m.cycles.length===0||m.cycles.includes(cyc));
  return(
    <div>
      <SHdr title="Matières 📖" sub={`${data.matieres.length} matière(s)`} action={<Btn ch="+ Nouvelle matière" v="primary" onClick={openNew}/>}/>
      {data.matieres.length===0?<Card><Empty icon="📖" text="Aucune matière. Créez-en une."/></Card>:(
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          {CYCLES.map(cyc=>{
            const mats=matCycle(cyc);
            if(mats.length===0)return null;
            return(<div key={cyc}>
              <div style={{fontSize:13,fontWeight:800,color:"#475569",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>{cyc==="Maternelle"?"🟨":cyc==="Primaire"?"🟦":cyc==="Collège"?"🟪":"🟩"} {cyc}</div>
              <Card s={{padding:0,overflow:"hidden"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr style={{background:"#f8fafc"}}>{["Matière","Coeff.","Enseignant","Cycles",""].map(h=><th key={h} style={{padding:"9px 14px",textAlign:"left",fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
                  <tbody>{mats.map((m,i)=>(
                    <tr key={m.id} style={{borderTop:i>0?"1px solid #f8fafc":"none"}}>
                      <td style={{padding:"10px 14px",fontWeight:700,fontSize:13,color:"#0f172a"}}>{m.nom}</td>
                      <td style={{padding:"10px 14px"}}><span style={{background:"#eff6ff",color:"#1a56db",borderRadius:7,padding:"2px 9px",fontSize:12,fontWeight:700}}>×{m.coefficient}</span></td>
                      <td style={{padding:"10px 14px",fontSize:12,color:"#64748b"}}>{m.enseignant||"—"}</td>
                      <td style={{padding:"10px 14px",fontSize:11,color:"#94a3b8"}}>{(!m.cycles||m.cycles.length===0)?"Tous":m.cycles.join(", ")}</td>
                      <td style={{padding:"10px 14px",textAlign:"right"}}><div style={{display:"inline-flex",gap:6}}>
                        <button onClick={()=>{setErr("");setForm({nom:m.nom,coefficient:m.coefficient,enseignant:m.enseignant||"",cycles:m.cycles||[]});setModal(m.id);}} style={{background:"#f1f5f9",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>✏️</button>
                        <button onClick={()=>ops.deleteMat(m.id)} style={{background:"#fef2f2",color:"#dc2626",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>🗑️</button>

                  ))}</tbody>
                </table>
              </Card>
            </div>);
          })}

      {modal&&<Modal title={modal==="add"?"Nouvelle matière":"Modifier"} onClose={()=>setModal(null)}>

        <Inp label="Coefficient" type="number" value={form.coefficient} onChange={e=>setForm(f=>({...f,coefficient:e.target.value}))}/>
        <Inp label="Enseignant responsable" value={form.enseignant} onChange={e=>setForm(f=>({...f,enseignant:e.target.value}))}/>
        <Lbl t="Cycles concernés (aucun = tous)">
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {CYCLES.map(cyc=>{const on=(form.cycles||[]).includes(cyc);return(
              <button key={cyc} onClick={()=>toggleCycle(cyc)} style={{padding:"7px 13px",borderRadius:20,border:on?"2px solid #1a56db":"1.5px solid #e2e8f0",background:on?"#eff6ff":"#fff",color:on?"#1a56db":"#64748b",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{on?"✓ ":""}{cyc}</button>
            );})}
          </div>
        </Lbl>
        {err&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:9,padding:"9px 13px",color:"#dc2626",fontSize:12,margin:"4px 0"}}>{err}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn ch="Annuler" v="ghost" onClick={()=>setModal(null)}/><Btn ch={loading?"...":"Enregistrer"} v="success" onClick={save} disabled={loading}/></div>
      </Modal>}
    </div>
  );
}

// ── ÉLÈVES ────────────────────────────────────────────────────────────────────
function Professeurs({data,ops,etab}) {
  const devise=etab?.devise||"GNF";
  const [modal,setModal]=useState(null);
  const [sel,setSel]=useState(null);
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const blank={nom:"",prenom:"",genre:"",telephone:"",email:"",matieres_txt:"",date_embauche:"",type_salaire:"mensuel",salaire:"",taux_horaire:""};
  const [form,setForm]=useState(blank);
  const norm=s=>(s||"").trim().toLowerCase().replace(/\s+/g," ");
  const save=async()=>{
    if(!form.nom||!form.prenom){setErr("Nom et prénom obligatoires.");return;}
    const doublon=(data.professeurs||[]).find(p=>p.id!==modal&&norm(p.nom)===norm(form.nom)&&norm(p.prenom)===norm(form.prenom));
    if(doublon){setErr(`Le professeur "${form.prenom} ${form.nom}" existe déjà.`);return;}
    setErr("");setLoading(true);
    if(modal==="add")await ops.addProf(form);else await ops.updateProf(modal,form);
    setLoading(false);setModal(null);
  };
  const openNew=()=>{setErr("");setForm(blank);setModal("add");};
  const openEdit=p=>{setErr("");setForm({nom:p.nom,prenom:p.prenom,genre:p.genre||"",telephone:p.telephone||"",email:p.email||"",matieres_txt:p.matieres_txt||"",date_embauche:p.date_embauche||"",type_salaire:p.type_salaire||"mensuel",salaire:p.salaire??"",taux_horaire:p.taux_horaire??""});setModal(p.id);};

  // Vue détail d'un professeur (salaires + absences)
  if(sel){
    const p=(data.professeurs||[]).find(x=>x.id===sel);
    if(!p){setSel(null);return null;}
    return <ProfDetail {...{prof:p,data,ops,etab,devise,onBack:()=>setSel(null)}}/>;

  return(
    <div>
      <SHdr title="Professeurs 👨‍🏫" sub={`${(data.professeurs||[]).length} enseignant(s)`} action={<Btn ch="+ Nouveau professeur" v="primary" onClick={openNew}/>}/>
      {(data.professeurs||[]).length===0?<Card><Empty icon="👨‍🏫" text="Aucun professeur. Ajoutez-en un."/></Card>:(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:13}}>
          {(data.professeurs||[]).map(p=>{
            const abs=(data.absences_prof||[]).filter(a=>a.prof_id===p.id).length;
            return(
            <Card key={p.id} s={{cursor:"pointer"}}>
              <div onClick={()=>setSel(p.id)}>
                <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:10}}>
                  <div style={{width:42,height:42,borderRadius:11,background:"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:"#1a56db",fontSize:15}}>{p.prenom?.[0]}{p.nom?.[0]}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800,fontSize:14,color:"#0f172a"}}>{p.prenom} {p.nom}</div>
                    <div style={{fontSize:11,color:"#94a3b8"}}>{p.matieres_txt||"—"}</div>
                  </div>
                </div>
                <div style={{fontSize:12,color:"#64748b",lineHeight:1.7}}>
                  {p.telephone&&<div>📞 {p.telephone}</div>}
                  <div>💰 {p.type_salaire==="horaire"?`${fmtMoney(p.taux_horaire,devise)}/h`:`${fmtMoney(p.salaire,devise)}/mois`}</div>
                  {abs>0&&<div style={{color:"#c2410c"}}>🚫 {abs} absence(s)</div>}
                </div>
              </div>
              <div style={{display:"flex",gap:6,marginTop:11,paddingTop:11,borderTop:"1px solid #f1f5f9"}}>
                <button onClick={()=>setSel(p.id)} style={{flex:1,background:"#eff6ff",color:"#1a56db",border:"none",borderRadius:8,padding:"7px",cursor:"pointer",fontSize:12,fontWeight:700}}>Gérer</button>
                <button onClick={()=>openEdit(p)} style={{background:"#f1f5f9",border:"none",borderRadius:8,padding:"7px 11px",cursor:"pointer"}}>✏️</button>
                <button onClick={()=>ops.deleteProf(p.id)} style={{background:"#fef2f2",border:"none",borderRadius:8,padding:"7px 11px",cursor:"pointer"}}>🗑️</button>
              </div>
            </Card>
          );})}
        </div>
      )}
      {modal&&<Modal title={modal==="add"?"Nouveau professeur":"Modifier le professeur"} onClose={()=>setModal(null)} w={560}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 13px"}}>
          <Inp label="Prénom *" value={form.prenom} onChange={e=>setForm(f=>({...f,prenom:e.target.value}))}/>
          <Inp label="Nom *" value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))}/>
          <Inp label="Téléphone" value={form.telephone} onChange={e=>setForm(f=>({...f,telephone:e.target.value}))}/>
          <Inp label="Email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/>
        </div>
        <Inp label="Matière(s) enseignée(s)" value={form.matieres_txt} onChange={e=>setForm(f=>({...f,matieres_txt:e.target.value}))} placeholder="Ex: Mathématiques, Physique"/>
        <Slt label="Genre" value={form.genre} onChange={e=>setForm(f=>({...f,genre:e.target.value}))} opts={[{v:"",l:"— Choisir —"},{v:"M",l:"Masculin"},{v:"F",l:"Féminin"}]}/>
        <Inp label="Date d'embauche" type="date" value={form.date_embauche} onChange={e=>setForm(f=>({...f,date_embauche:e.target.value}))}/>
        <Slt label="Type de rémunération" value={form.type_salaire} onChange={e=>setForm(f=>({...f,type_salaire:e.target.value}))} opts={[{v:"mensuel",l:"Salaire mensuel fixe"},{v:"horaire",l:"Paiement à l'heure / séance"}]}/>
        {form.type_salaire==="horaire"
          ? <Inp label={`Taux horaire (${devise})`} type="number" value={form.taux_horaire} onChange={e=>setForm(f=>({...f,taux_horaire:e.target.value}))}/>
          : <Inp label={`Salaire mensuel (${devise})`} type="number" value={form.salaire} onChange={e=>setForm(f=>({...f,salaire:e.target.value}))}/>}
        {err&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:9,padding:"9px 13px",color:"#dc2626",fontSize:12,marginTop:4}}>{err}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn ch="Annuler" v="ghost" onClick={()=>setModal(null)}/><Btn ch={loading?"...":"Enregistrer"} v="success" onClick={save} disabled={loading}/></div>
      </Modal>}
    </div>
  );
}

// Détail d'un professeur : salaires versés + absences
function ProfDetail({prof,data,ops,etab,devise,onBack}) {
  const [modalSal,setModalSal]=useState(false);
  const [loading,setLoading]=useState(false);
  const MOIS=["Septembre","Octobre","Novembre","Décembre","Janvier","Février","Mars","Avril","Mai","Juin","Juillet"];
  const blankSal={mois:"",montant:prof.type_salaire==="mensuel"?(prof.salaire||""):"",date:TODAY,heures:"",note:""};
  const [salForm,setSalForm]=useState(blankSal);
  const [absDate,setAbsDate]=useState(TODAY);
  const [absMotif,setAbsMotif]=useState("");

  const absences=(data.absences_prof||[]).filter(a=>a.prof_id===prof.id).sort((a,b)=>b.date.localeCompare(a.date));

  return(
    <div>

          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:18,color:"#0f172a"}}>{prof.prenom} {prof.nom}</div>
            <div style={{fontSize:12,color:"#64748b"}}>{prof.matieres_txt||"—"}{prof.telephone?` · 📞 ${prof.telephone}`:""}</div>
            <div style={{fontSize:12,color:"#64748b"}}>{prof.type_salaire==="horaire"?`Taux : ${fmtMoney(prof.taux_horaire,devise)}/h`:`Salaire : ${fmtMoney(prof.salaire,devise)}/mois`}{prof.date_embauche?` · Embauché le ${prof.date_embauche}`:""}</div>
          </div>
        </div>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        {/* Salaires */}
        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:14,color:"#0f172a"}}>💰 Salaires versés</div>
            <Btn ch="+ Verser" v="primary" s={{padding:"6px 12px",fontSize:12}} onClick={()=>{setSalForm(blankSal);setModalSal(true);}}/>

          </div>
          {salaires.length===0?<div style={{fontSize:12,color:"#94a3b8",textAlign:"center",padding:10}}>Aucun versement.</div>:(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {salaires.map(s=>(
                <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",background:"#f8fafc",borderRadius:9}}>

                    <div style={{fontSize:11,color:"#94a3b8"}}>{s.mois||"—"} · {s.date}{s.heures?` · ${s.heures}h`:""}</div>
                  </div>
                  <button onClick={()=>ops.deleteSalaire(s.id)} style={{background:"#fef2f2",border:"none",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:11}}>🗑️</button>
                </div>

          <div style={{fontWeight:800,fontSize:14,color:"#0f172a",marginBottom:12}}>🚫 Absences</div>

            <input type="date" value={absDate} onChange={e=>setAbsDate(e.target.value)} style={{width:"100%",padding:"8px 11px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",marginBottom:7}}/>
            <input value={absMotif} onChange={e=>setAbsMotif(e.target.value)} placeholder="Motif (maladie, congé...)" style={{width:"100%",padding:"8px 11px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",marginBottom:7,boxSizing:"border-box"}}/>
            <Btn ch="Marquer absent" v="ghost" s={{width:"100%"}} onClick={marquerAbsent}/>
          </div>
          {absences.length===0?<div style={{fontSize:12,color:"#94a3b8",textAlign:"center",padding:10}}>Aucune absence enregistrée.</div>:(

                <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",background:"#fff7ed",borderRadius:9}}>

                    {a.motif&&<div style={{fontSize:11,color:"#c2410c"}}>{a.motif}</div>}

                </div>

          )}
        </Card>
      </div>
      {modalSal&&<Modal title="Verser un salaire" onClose={()=>setModalSal(false)}>
        <Slt label="Mois concerné" value={salForm.mois} onChange={e=>setSalForm(f=>({...f,mois:e.target.value}))} opts={[{v:"",l:"— Choisir —"},...MOIS.map(m=>({v:m,l:m}))]}/>
        {prof.type_salaire==="horaire"&&<Inp label="Nombre d'heures" type="number" value={salForm.heures} onChange={e=>setSalForm(f=>({...f,heures:e.target.value,montant:e.target.value?String(parseFloat(e.target.value)*parseFloat(prof.taux_horaire||0)):f.montant}))}/>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 13px"}}>
          <Inp label={`Montant (${devise}) *`} type="number" value={salForm.montant} onChange={e=>setSalForm(f=>({...f,montant:e.target.value}))}/>
          <Inp label="Date *" type="date" value={salForm.date} onChange={e=>setSalForm(f=>({...f,date:e.target.value}))}/>
        </div>
        <Inp label="Note (facultatif)" value={salForm.note} onChange={e=>setSalForm(f=>({...f,note:e.target.value}))}/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn ch="Annuler" v="ghost" onClick={()=>setModalSal(false)}/><Btn ch={loading?"...":"💾 Enregistrer"} v="success" onClick={saveSal} disabled={loading}/></div>
      </Modal>}
    </div>
  );
}

function EmploiTemps({data,ops,etab,currentUser}) {
  const JOURS=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
  const [classeId,setClasseId]=useState(data.classes[0]?.id||"");
  const [modal,setModal]=useState(null);
  const [loading,setLoading]=useState(false);
  const blank={jour:"Lundi",debut:"08:00",fin:"09:00",matiere_id:"",prof_id:"",salle:""};
  const [form,setForm]=useState(blank);
  const [ctDate,setCtDate]=useState(TODAY);
  const [ctTitre,setCtTitre]=useState("");
  const classe=data.classes.find(c=>c.id===parseInt(classeId));
  const creneaux=(data.emploi_temps||[]).filter(c=>c.classe_id===parseInt(classeId)).sort((a,b)=>(a.debut||"").localeCompare(b.debut||""));
  const matsClasse=data.matieres.filter(m=>!m.cycles||m.cycles.length===0||m.cycles.includes(classe?.niveau));
  const save=async()=>{
    if(!form.matiere_id){return;}
    setLoading(true);
    const payload={...form,classe_id:parseInt(classeId),matiere_id:parseInt(form.matiere_id),prof_id:form.prof_id?parseInt(form.prof_id):null};
    if(modal==="add")await ops.addCreneau(payload);else await ops.updateCreneau(modal,payload);
    setLoading(false);setModal(null);
  };
  const openNew=(jour)=>{setForm({...blank,jour:jour||"Lundi"});setModal("add");};
  const matNom=id=>data.matieres.find(m=>m.id===id)?.nom||"—";
  const profNom=id=>{const p=data.professeurs?.find(x=>x.id===id);return p?`${p.prenom} ${p.nom}`:"";};
  const printEDT=()=>{
    if(!classe)return;
    const byJour=JOURS.map(j=>({j,items:creneaux.filter(c=>c.jour===j)})).filter(x=>x.items.length>0);
    const corps=byJour.map(({j,items})=>`
      <div style="margin-bottom:10px">
        <div style="background:#1a56db;color:#fff;font-weight:700;padding:5px 10px;border-radius:6px 6px 0 0;font-size:12px">${j}</div>
        <table style="width:100%;border-collapse:collapse;font-size:11px">
          <thead><tr style="background:#f1f5f9">
            <th style="border:1px solid #e2e8f0;padding:5px;text-align:left">Horaire</th>
            <th style="border:1px solid #e2e8f0;padding:5px;text-align:left">Matière</th>
            <th style="border:1px solid #e2e8f0;padding:5px;text-align:left">Professeur</th>
            <th style="border:1px solid #e2e8f0;padding:5px;text-align:left">Salle</th>
          </tr></thead>
          <tbody>${items.map(c=>`<tr>
            <td style="border:1px solid #e2e8f0;padding:5px"><b>${c.debut} - ${c.fin}</b></td>
            <td style="border:1px solid #e2e8f0;padding:5px">${matNom(c.matiere_id)}</td>
            <td style="border:1px solid #e2e8f0;padding:5px">${profNom(c.prof_id)||"—"}</td>
            <td style="border:1px solid #e2e8f0;padding:5px">${c.salle||"—"}</td>
          </tr>`).join("")}</tbody>
        </table>
      </div>`).join("");
    printHTML(`${officialHeader(etab,{classe:classe.nom,docTitle:"EMPLOI DU TEMPS"})}${corps||"<p>Aucun cours programmé.</p>"}`,`Emploi du temps ${classe.nom}`);
  };
  return(
    <div>
      <SHdr title="Emploi du temps 🗓️" sub={classe?`Classe : ${classe.nom}`:"Choisissez une classe"} action={creneaux.length>0&&<Btn ch="🖨️ Imprimer" v="ghost" onClick={printEDT}/>}/>
      {data.classes.length===0?<Card><Empty icon="🏫" text="Créez d'abord des classes."/></Card>:(<>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:18,flexWrap:"wrap"}}>
          <select value={classeId} onChange={e=>setClasseId(e.target.value)} style={{padding:"9px 13px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:13,fontWeight:700,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",color:"#0f172a"}}>
            {CYCLES.map(cyc=>{const cls=data.classes.filter(c=>(c.niveau||"Primaire")===cyc);if(cls.length===0)return null;return(
              <optgroup key={cyc} label={cyc}>{cls.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}</optgroup>
            );})}
          </select>
          <Btn ch="+ Ajouter un cours" v="primary" onClick={()=>openNew()}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
          {JOURS.map(jour=>{
            const items=creneaux.filter(c=>c.jour===jour);
            return(
              <Card key={jour} s={{padding:0,overflow:"hidden"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 15px",background:"#1a56db"}}>
                  <span style={{fontWeight:800,fontSize:14,color:"#fff"}}>{jour}</span>
                  <button onClick={()=>openNew(jour)} style={{background:"rgba(255,255,255,0.2)",color:"#fff",border:"none",borderRadius:7,width:26,height:26,cursor:"pointer",fontSize:16,lineHeight:1}}>+</button>
                </div>
                <div style={{padding:12}}>
                  {items.length===0?<div style={{fontSize:12,color:"#cbd5e1",textAlign:"center",padding:"14px 0"}}>Aucun cours</div>:(
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {items.map(c=>(
                        <div key={c.id} style={{background:"#f8fafc",borderRadius:10,padding:"9px 11px",borderLeft:"3px solid #1a56db"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:11,fontWeight:800,color:"#1a56db"}}>{c.debut} - {c.fin}</div>
                              <div style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>{matNom(c.matiere_id)}</div>
                              {profNom(c.prof_id)&&<div style={{fontSize:11,color:"#64748b"}}>👨‍🏫 {profNom(c.prof_id)}</div>}
                              {c.salle&&<div style={{fontSize:11,color:"#64748b"}}>📍 {c.salle}</div>}
                            </div>
                            <div style={{display:"flex",gap:4}}>
                              <button onClick={()=>{setForm({jour:c.jour,debut:c.debut,fin:c.fin,matiere_id:String(c.matiere_id||""),prof_id:String(c.prof_id||""),salle:c.salle||""});setModal(c.id);}} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:6,padding:"3px 6px",cursor:"pointer",fontSize:10}}>✏️</button>
                              <button onClick={()=>ops.deleteCreneau(c.id)} style={{background:"#fef2f2",border:"none",borderRadius:6,padding:"3px 6px",cursor:"pointer",fontSize:10}}>🗑️</button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </Card>
            );
          })}
        </div>
        {/* Cahier de texte / Leçon du jour */}
        <Card s={{marginTop:18}}>
          <div style={{fontWeight:800,fontSize:14,color:"#0f172a",marginBottom:4,fontFamily:"'Sora',sans-serif"}}>📒 Cahier de texte — Leçon du jour</div>
          <div style={{fontSize:11,color:"#64748b",marginBottom:14}}>Notez ce qui a été enseigné dans {classe?.nom} pour assurer le suivi pédagogique.</div>
          <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap",marginBottom:14}}>
            <div style={{width:170}}><Inp label="Date" type="date" value={ctDate} onChange={e=>setCtDate(e.target.value)}/></div>
            <div style={{flex:1,minWidth:220}}><Inp label="Leçon / contenu enseigné" value={ctTitre} onChange={e=>setCtTitre(e.target.value)} placeholder="Ex: Les fractions — addition et soustraction"/></div>
            <Btn ch="Enregistrer la leçon" v="success" onClick={()=>{if(ctTitre.trim()){ops.setTitreJour(parseInt(classeId),ctDate,ctTitre,`${currentUser?.prenom||""} ${currentUser?.nom||""}`.trim());setCtTitre("");}}} disabled={!ctTitre.trim()}/>
          </div>
          {(()=>{const list=(data.titres_jour||[]).filter(t=>t.classe_id===parseInt(classeId));return list.length===0?<div style={{fontSize:12,color:"#94a3b8"}}>Aucune leçon enregistrée pour cette classe.</div>:(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {list.slice(0,12).map(t=>(
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 13px",background:"#f8fafc",borderRadius:10,borderLeft:"3px solid #1a56db"}}>
                  <div style={{fontSize:11,fontWeight:800,color:"#1a56db",minWidth:88}}>{t.date}</div>
                  <div style={{flex:1}}><div style={{fontSize:13,color:"#0f172a",fontWeight:600}}>{t.titre}</div>{t.auteur&&<div style={{fontSize:10.5,color:"#94a3b8"}}>✍️ {t.auteur}</div>}</div>
                  <button onClick={()=>ops.setTitreJour(parseInt(classeId),t.date,"",t.auteur)} style={{background:"#fef2f2",color:"#dc2626",border:"none",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:11}}>🗑️</button>
                </div>
              ))}
            </div>
          );})()}
        </Card>
      </>)}
      {modal&&<Modal title={modal==="add"?"Ajouter un cours":"Modifier le cours"} onClose={()=>setModal(null)}>
        <Slt label="Jour" value={form.jour} onChange={e=>setForm(f=>({...f,jour:e.target.value}))} opts={JOURS.map(j=>({v:j,l:j}))}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 13px"}}>
          <Inp label="Heure début" type="time" value={form.debut} onChange={e=>setForm(f=>({...f,debut:e.target.value}))}/>
          <Inp label="Heure fin" type="time" value={form.fin} onChange={e=>setForm(f=>({...f,fin:e.target.value}))}/>
        </div>
        <Slt label="Matière *" value={form.matiere_id} onChange={e=>setForm(f=>({...f,matiere_id:e.target.value}))} opts={[{v:"",l:"— Choisir —"},...matsClasse.map(m=>({v:String(m.id),l:m.nom}))]}/>
        <Slt label="Professeur" value={form.prof_id} onChange={e=>setForm(f=>({...f,prof_id:e.target.value}))} opts={[{v:"",l:"— Aucun —"},...(data.professeurs||[]).map(p=>({v:String(p.id),l:`${p.prenom} ${p.nom}`}))]}/>
        <Inp label="Salle" value={form.salle} onChange={e=>setForm(f=>({...f,salle:e.target.value}))} placeholder="Ex: Salle 3"/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn ch="Annuler" v="ghost" onClick={()=>setModal(null)}/><Btn ch={loading?"...":"Enregistrer"} v="success" onClick={save} disabled={loading}/></div>
      </Modal>}
    </div>
  );
}

function FicheNotes({data,ops,etab,onEtabUpdate}) {
  const ALIGNS=[{v:"left",l:"Gauche"},{v:"center",l:"Centre"},{v:"right",l:"Droite"}];
  const COULEURS=["#1a56db","#0f766e","#7c3aed","#b91c1c","#c2410c","#475569","#0f172a"];
  const colDefaut=()=>([
    {nom:"N°",largeur:40,couleur:"#1a56db",align:"center"},
    {nom:"Nom & Prénom",largeur:200,couleur:"#1a56db",align:"left",auto:"nom"},
    {nom:"Matricule",largeur:110,couleur:"#1a56db",align:"center",auto:"matricule"},
    {nom:"Devoir 1",largeur:80,couleur:"#0f766e",align:"center"},
    {nom:"Devoir 2",largeur:80,couleur:"#0f766e",align:"center"},
    {nom:"Composition",largeur:90,couleur:"#7c3aed",align:"center"},
    {nom:"Moyenne",largeur:80,couleur:"#b91c1c",align:"center"},
    {nom:"Observations",largeur:150,couleur:"#475569",align:"left"},
  ]);
  const [classeId,setClasseId]=useState(data.classes[0]?.id||"");
  const [cols,setCols]=useState(colDefaut());
  const [lignesVides,setLignesVides]=useState(3);
  const [titre,setTitre]=useState("FICHE DE NOTES");
  const [modeleNom,setModeleNom]=useState("");
  const modeles=Array.isArray(etab.fiche_modeles)?etab.fiche_modeles:[];
  const classe=data.classes.find(c=>c.id===parseInt(classeId));
  const eleves=data.eleves.filter(e=>e.classe_id===parseInt(classeId));

  const setCol=(i,k,v)=>setCols(cs=>{const n=[...cs];n[i]={...n[i],[k]:v};return n;});
  const addCol=()=>setCols(cs=>[...cs,{nom:"Nouvelle colonne",largeur:80,couleur:"#0f766e",align:"center"}]);
  const delCol=i=>setCols(cs=>cs.filter((_,j)=>j!==i));
  const moveCol=(i,dir)=>setCols(cs=>{const n=[...cs];const j=i+dir;if(j<0||j>=n.length)return cs;[n[i],n[j]]=[n[j],n[i]];return n;});

  const saveModele=async()=>{
    if(!modeleNom.trim())return;
    const nouveau={nom:modeleNom.trim(),cols,lignesVides,titre};
    const autres=modeles.filter(m=>m.nom!==nouveau.nom);
    const updated=await ops.updateEtab(etab.id,{fiche_modeles:[...autres,nouveau]});
    if(updated){onEtabUpdate(updated);setModeleNom("");}
  };
  const chargerModele=m=>{setCols(m.cols||colDefaut());setLignesVides(m.lignesVides??3);setTitre(m.titre||"FICHE DE NOTES");};
  const supprModele=async(nom)=>{
    const updated=await ops.updateEtab(etab.id,{fiche_modeles:modeles.filter(m=>m.nom!==nom)});
    if(updated)onEtabUpdate(updated);
  };

  const imprimer=()=>{
    if(!classe)return;
    const th=cols.map(c=>`<th style="border:1px solid #94a3b8;padding:6px 8px;background:${c.couleur};color:#fff;font-size:11px;text-align:${c.align};width:${c.largeur}px">${c.nom}</th>`).join("");
    const rowsEleves=eleves.map((e,i)=>`<tr>${cols.map(c=>{
      let val="";
      if(c.auto==="nom")val=`${e.prenom||""} ${e.nom||""}`;
      else if(c.auto==="matricule")val=e.matricule||"";
      else if(c.nom==="N°"||c.auto==="num")val=i+1;
      return `<td style="border:1px solid #cbd5e1;padding:6px 8px;font-size:11px;text-align:${c.align};height:24px">${val}</td>`;
    }).join("")}</tr>`).join("");
    const rowsVides=Array.from({length:lignesVides}).map((_,k)=>`<tr>${cols.map(c=>{
      const val=(c.nom==="N°"||c.auto==="num")?(eleves.length+k+1):"";
      return `<td style="border:1px solid #cbd5e1;padding:6px 8px;font-size:11px;text-align:${c.align};height:24px">${val}</td>`;
    }).join("")}</tr>`).join("");
    printHTML(`${officialHeader(etab,{classe:classe.nom,docTitle:titre})}
      <table style="width:100%;border-collapse:collapse;margin-top:8px">
        <thead><tr>${th}</tr></thead>
        <tbody>${rowsEleves}${rowsVides}</tbody>
      </table>`,`${titre} ${classe.nom}`);
  };

  return(
    <div>
      <SHdr title="Fiche de notes vierge 🖨️" sub="Composez et imprimez une fiche de notes à remplir à la main" action={classe&&<Btn ch="🖨️ Imprimer la fiche" v="primary" onClick={imprimer}/>}/>
      {data.classes.length===0?<Card><Empty icon="🏫" text="Créez d'abord des classes."/></Card>:(<>
        <Card s={{marginBottom:16}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:13}}>
            <div>
              <Lbl t="Classe"><select value={classeId} onChange={e=>setClasseId(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,fontWeight:600,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
                {CYCLES.map(cyc=>{const cls=data.classes.filter(c=>(c.niveau||"Primaire")===cyc);if(cls.length===0)return null;return(<optgroup key={cyc} label={cyc}>{cls.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}</optgroup>);})}
              </select></Lbl>
            </div>
            <Inp label="Titre du document" value={titre} onChange={e=>setTitre(e.target.value)}/>
            <Inp label="Lignes vides en bas" type="number" value={lignesVides} onChange={e=>setLignesVides(Math.max(0,parseInt(e.target.value)||0))}/>
          </div>
          <div style={{fontSize:12,color:"#64748b",marginTop:6}}>👥 {eleves.length} élève(s) seront pré-remplis, plus {lignesVides} ligne(s) vide(s).</div>
        </Card>

        <Card s={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:14,color:"#0f172a"}}>📐 Colonnes de la fiche</div>
            <Btn ch="+ Ajouter une colonne" v="ghost" s={{padding:"6px 12px",fontSize:12}} onClick={addCol}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {cols.map((c,i)=>(
              <div key={i} style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",background:"#f8fafc",borderRadius:10,padding:"8px 10px"}}>
                <div style={{display:"flex",flexDirection:"column",gap:2}}>

                <div style={{display:"flex",gap:3}}>{COULEURS.map(col=>(

                ))}</div>

            <table style={{borderCollapse:"collapse",width:"100%"}}>

              {modeles.map(m=>(
