        </Card>
      </>)}
    </div>
  );
}

function Eleves({data,ops,etab}) {
  const [modal,setModal]=useState(null);const [search,setSearch]=useState("");const [filterCl,setFilterCl]=useState("");
  const [form,setForm]=useState({nom:"",prenom:"",genre:"",classe_id:"",date_naissance:"",lieu_naissance:"",tuteur:"",pere:"",tel_pere:"",mere:"",tel_mere:"",telephone:"",frais_annuel:"",frais_inscription_eleve:"",inscPayee:false});
  const [loading,setLoading]=useState(false);const [err,setErr]=useState("");
  const save=async()=>{
    if(!form.nom||!form.prenom)return;
    // Anti-doublon : même nom+prénom dans la même classe
    const norm=s=>(s||"").trim().toLowerCase().replace(/\s+/g," ");
    const cid=parseInt(form.classe_id)||data.classes[0]?.id;
    const doublon=data.eleves.find(e=>e.id!==modal&&norm(e.nom)===norm(form.nom)&&norm(e.prenom)===norm(form.prenom)&&e.classe_id===cid);
    if(doublon){setErr(`Un élève "${form.prenom} ${form.nom}" existe déjà dans cette classe.`);return;}
    setErr("");setLoading(true);
    const {inscPayee,...data2}=form;
    if(modal==="add"){
      const created=await ops.addEleve({...data2,classe_id:cid,prefixe:etab.prefixe});
      if(created&&inscPayee){
        const clCreated=data.classes.find(c=>c.id===created.classe_id);
        const montantInsc=fraisInscEleve(created,etab,clCreated);
        if(montantInsc>0)await ops.addPaiement({eleve_id:created.id,type:"Frais d'inscription",montant:montantInsc,date:TODAY,mois:"",note:"Réglé à l'inscription",eleve_nom:`${created.prenom} ${created.nom}`,matricule:created.matricule});
      }
    } else await ops.updateEleve(modal,{...data2,classe_id:parseInt(form.classe_id)});
    setLoading(false);setModal(null);
  };
  const [cycle,setCycle]=useState("Primaire");
  const classesCycle=data.classes.filter(c=>(c.niveau||"Primaire")===cycle);
  const countCycle=cyc=>data.eleves.filter(e=>{const c=data.classes.find(x=>x.id===e.classe_id);return (c?.niveau||"Primaire")===cyc;}).length;
  const matchSearch=e=>`${e.prenom} ${e.nom} ${e.matricule}`.toLowerCase().includes(search.toLowerCase());
  return(
    <div>
      <SHdr title="Élèves 👨‍🎓" sub={`${data.eleves.length} élève(s) au total`} action={
        <div style={{display:"flex",gap:8}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher..." style={{padding:"8px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",width:170}}/>
          <Btn ch="+ Inscrire" v="primary" onClick={()=>{setErr("");setForm({nom:"",prenom:"",genre:"",classe_id:classesCycle[0]?.id||data.classes[0]?.id||"",date_naissance:"",lieu_naissance:"",tuteur:"",pere:"",tel_pere:"",mere:"",tel_mere:"",telephone:"",frais_annuel:"",frais_inscription_eleve:"",inscPayee:false});setModal("add");}}/>
        </div>
      }/>
      <div style={{display:"flex",gap:8,marginBottom:18}}>
        {CYCLES.map(cyc=>{const actif=cycle===cyc;const n=countCycle(cyc);return(
          <button key={cyc} onClick={()=>setCycle(cyc)} style={{flex:1,padding:"13px 16px",borderRadius:13,border:actif?"2px solid #1a56db":"1.5px solid #e2e8f0",background:actif?"#eff6ff":"#fff",cursor:"pointer",textAlign:"left",transition:"all .15s",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
            <div style={{fontSize:13,fontWeight:800,color:actif?"#1a56db":"#0f172a"}}>{cyc==="Primaire"?"🟦":cyc==="Collège"?"🟪":"🟩"} {cyc}</div>
            <div style={{fontSize:22,fontWeight:900,color:actif?"#1a56db":"#334155",marginTop:2}}>{n}<span style={{fontSize:11,color:"#94a3b8",fontWeight:600}}> élève(s)</span></div>
          </button>
        );})}
      </div>
      {classesCycle.length===0?<Card><Empty icon="🏫" text={`Aucune classe en ${cycle}. Créez une classe et choisissez le cycle "${cycle}".`}/></Card>:(
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {classesCycle.map(cl=>{
            const elevesClasse=data.eleves.filter(e=>e.classe_id===cl.id&&matchSearch(e));
            return(
              <Card key={cl.id} s={{padding:0,overflow:"hidden"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 18px",background:"#f8fafc",borderBottom:"1px solid #eef2f7"}}>
                  <div style={{fontWeight:800,fontSize:14,color:"#0f172a"}}>🏫 {cl.nom}</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {(()=>{const g=elevesClasse.filter(e=>e.genre==="M").length;const f=elevesClasse.filter(e=>e.genre==="F").length;return (g+f)>0?<span style={{display:"inline-flex",gap:5}}><span style={{fontSize:11,fontWeight:700,color:"#2563eb",background:"#eff6ff",borderRadius:6,padding:"1px 7px"}}>M : {g}</span><span style={{fontSize:11,fontWeight:700,color:"#db2777",background:"#fdf2f8",borderRadius:6,padding:"1px 7px"}}>F : {f}</span></span>:null;})()}
                    <span style={{background:"#1a56db",color:"#fff",borderRadius:20,padding:"3px 13px",fontSize:12,fontWeight:800}}>{elevesClasse.length} élève(s)</span>
                  </div>
                </div>
                {elevesClasse.length===0?<div style={{padding:"18px",textAlign:"center",color:"#94a3b8",fontSize:12}}>{search?"Aucun résultat dans cette classe.":"Aucun élève dans cette classe."}</div>:(
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <tbody>{elevesClasse.map((e,i)=>(
                      <tr key={e.id} style={{borderTop:i>0?"1px solid #f8fafc":"none"}}>
                        <td style={{padding:"10px 18px",width:36,color:"#cbd5e1",fontSize:12}}>{i+1}</td>
                        <td style={{padding:"10px 6px"}}><div style={{display:"flex",alignItems:"center",gap:9}}>
                          <div style={{width:31,height:31,borderRadius:9,background:"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:"#1a56db",fontSize:11}}>{e.prenom?.[0]}{e.nom?.[0]}</div>
                          <div><div style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>{e.prenom} {e.nom}</div>{e.tuteur&&<div style={{fontSize:11,color:"#94a3b8"}}>👤 {e.tuteur}</div>}</div>
                        </div></td>
                        <td style={{padding:"10px 6px",fontFamily:"monospace",fontSize:12,color:"#64748b"}}>{e.matricule}</td>
                        <td style={{padding:"10px 18px",textAlign:"right"}}><div style={{display:"inline-flex",gap:6}}>
                          <button onClick={()=>{setErr("");setForm({nom:e.nom,prenom:e.prenom,genre:e.genre||"",classe_id:e.classe_id,date_naissance:e.date_naissance||"",lieu_naissance:e.lieu_naissance||"",tuteur:e.tuteur||"",pere:e.pere||"",tel_pere:e.tel_pere||"",mere:e.mere||"",tel_mere:e.tel_mere||"",telephone:e.telephone||"",frais_annuel:e.frais_annuel??"",frais_inscription_eleve:e.frais_inscription_eleve??"",inscPayee:false});setModal(e.id);}} style={{background:"#f1f5f9",border:"none",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:11,fontWeight:700}}>✏️</button>
                          <button onClick={()=>ops.deleteEleve(e.id)} style={{background:"#fef2f2",color:"#dc2626",border:"none",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:11,fontWeight:700}}>🗑️</button>
                        </div></td>
                      </tr>
                    ))}</tbody>
                  </table>
                )}
              </Card>
            );
          })}
        </div>
      )}
      {modal&&<Modal title={modal==="add"?"Inscrire un élève":"Modifier"} onClose={()=>setModal(null)} w={540}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 13px"}}>
          <Inp label="Nom *" value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))}/>
          <Inp label="Prénom *" value={form.prenom} onChange={e=>setForm(f=>({...f,prenom:e.target.value}))}/>
          <Inp label="Date naissance" type="date" value={form.date_naissance} onChange={e=>setForm(f=>({...f,date_naissance:e.target.value}))}/>
          <Inp label="Lieu naissance" value={form.lieu_naissance} onChange={e=>setForm(f=>({...f,lieu_naissance:e.target.value}))}/>
          <Slt label="Genre" value={form.genre} onChange={e=>setForm(f=>({...f,genre:e.target.value}))} opts={[{v:"",l:"— Choisir —"},{v:"M",l:"Masculin"},{v:"F",l:"Féminin"}]}/>
          <div style={{gridColumn:"1/-1"}}><Slt label="Classe *" value={form.classe_id} onChange={e=>setForm(f=>({...f,classe_id:e.target.value}))} opts={data.classes.map(c=>({v:c.id,l:c.nom}))}/></div>
          <Inp label="Père" value={form.pere} onChange={e=>setForm(f=>({...f,pere:e.target.value}))} placeholder="Nom du père"/>
          <Inp label="Téléphone père" value={form.tel_pere} onChange={e=>setForm(f=>({...f,tel_pere:e.target.value}))}/>
          <Inp label="Mère" value={form.mere} onChange={e=>setForm(f=>({...f,mere:e.target.value}))} placeholder="Nom de la mère"/>
          <Inp label="Téléphone mère" value={form.tel_mere} onChange={e=>setForm(f=>({...f,tel_mere:e.target.value}))}/>
          <Inp label="Tuteur/Parent" value={form.tuteur} onChange={e=>setForm(f=>({...f,tuteur:e.target.value}))}/>
          <Inp label="Téléphone parent/tuteur" value={form.telephone} onChange={e=>setForm(f=>({...f,telephone:e.target.value}))}/>
          <div style={{gridColumn:"1/-1"}}><Inp label={`Frais annuels scolarité (${etab.devise||"GNF"}) — vide = défaut école`} type="number" value={form.frais_annuel} onChange={e=>setForm(f=>({...f,frais_annuel:e.target.value}))} placeholder={etab.frais_annuel_defaut?`Défaut : ${etab.frais_annuel_defaut}`:"Bourse/réduction possible"}/></div>
          <div style={{gridColumn:"1/-1"}}><Inp label={`Frais d'inscription (${etab.devise||"GNF"}) — vide = défaut école`} type="number" value={form.frais_inscription_eleve} onChange={e=>setForm(f=>({...f,frais_inscription_eleve:e.target.value}))} placeholder={etab.fraisInscription?`Défaut : ${etab.fraisInscription}`:"Frais d'inscription"}/></div>
        </div>
        {modal==="add"&&<label style={{display:"flex",alignItems:"center",gap:9,padding:"10px 13px",background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:9,cursor:"pointer",marginTop:4}}>

function Notes({data,ops,etab,currentUser}) {
  const periodes=periodesList(etab.systeme);
  const [periode,setPeriode]=useState(periodes[0]);
  const [classeId,setClasseId]=useState(data.classes[0]?.id||"");
  const [localNotes,setLocalNotes]=useState({});
  const [saving,setSaving]=useState(false);
  const [dirty,setDirty]=useState(false);
  const [search,setSearch]=useState("");
  const inputsRef=useRef([]);

  const classeSel=data.classes.find(c=>c.id===parseInt(classeId));
  const bareme=baremeOf(classeSel?.niveau);
  // Restriction matières : un Professeur ne voit que ses matières autorisées
  const isProf=currentUser?.role==="Professeur";
  const autorisees=Array.isArray(currentUser?.matieres_autorisees)?currentUser.matieres_autorisees:[];
  // Matières du cycle de la classe + filtrage prof
  const matieresCycle=data.matieres.filter(m=>(!m.cycles||m.cycles.length===0||m.cycles.includes(classeSel?.niveau)) && (!isProf||autorisees.includes(m.id)));
  const [matiereId,setMatiereId]=useState(matieresCycle[0]?.id||"");
  // Si la matière courante n'est plus valide (changement de classe), réajuster
  useEffect(()=>{ if(!matieresCycle.find(m=>m.id===parseInt(matiereId))){ setMatiereId(matieresCycle[0]?.id||""); } },[classeId,data.matieres]);

  const matiere=data.matieres.find(m=>m.id===parseInt(matiereId));
  const classeElevesAll=data.eleves.filter(e=>e.classe_id===parseInt(classeId));
  const classeEleves=classeElevesAll.filter(e=>`${e.prenom} ${e.nom} ${e.matricule}`.toLowerCase().includes(search.toLowerCase()));

  useEffect(()=>{const n={};classeElevesAll.forEach(e=>{n[e.id]=e.notes?.[periode]?.[matiereId]??""});setLocalNotes(n);setDirty(false);},[periode,classeId,matiereId,data.eleves]);

  const setNote=(id,val)=>{setLocalNotes(n=>({...n,[id]:val}));setDirty(true);};
  const saveAll=async()=>{
    setSaving(true);
    const updates=classeElevesAll.map(e=>({id:e.id,notes:{...(e.notes||{}),[periode]:{...(e.notes?.[periode]||{}),[matiereId]:localNotes[e.id]===""||localNotes[e.id]==null?null:parseFloat(localNotes[e.id])}}}));
    await ops.saveAllNotes(updates);setSaving(false);setDirty(false);
  };
  // Navigation clavier : Entrée = champ suivant
  const onKey=(e,idx)=>{ if(e.key==="Enter"){e.preventDefault();const next=inputsRef.current[idx+1];if(next)next.focus();} };

  // Statistiques en direct
  const notesValides=classeElevesAll.map(e=>localNotes[e.id]).filter(v=>v!==""&&v!=null&&!isNaN(parseFloat(v))).map(v=>parseFloat(v));
  const moyClasse=notesValides.length?(notesValides.reduce((a,b)=>a+b,0)/notesValides.length):null;
  const plusHaut=notesValides.length?Math.max(...notesValides):null;
  const plusBas=notesValides.length?Math.min(...notesValides):null;
  const nbAdmis=notesValides.filter(v=>v>=bareme/2).length;
  const nbRemplies=notesValides.length;
  const totalEleves=classeElevesAll.length;

  const printFiche=()=>{
    const cl=classeSel;
    const rows=classeElevesAll.map((e,i)=>{const note=localNotes[e.id];const app=note!==""&&note!=null?MENTION(note,bareme):{t:"Non noté",c:"#94a3b8",bg:"#f8fafc"};return`<tr><td>${i+1}</td><td><b>${e.prenom} ${e.nom}</b></td><td>${e.matricule}</td><td style="text-align:center;font-weight:900;font-size:16px;color:${app.c}">${note!==""&&note!=null?note:"—"}</td><td>${app.t}</td></tr>`;}).join("");
    printHTML(`${officialHeader(etab,{classe:cl?.nom,docTitle:`Fiche de notes — ${matiere?.nom}`})}
    <p style="font-size:12px;color:#475569">Période : <b>${periode}</b> · Coefficient : <b>${matiere?.coefficient}</b> · Enseignant : <b>${matiere?.enseignant||"—"}</b></p>
    <table><tr><th>N°</th><th>Élève</th><th>Matricule</th><th>Note /${bareme}</th><th>Appréciation</th></tr>${rows}</table>
    <div class="sign"><span>Le/La titulaire : ____________________</span><span>Date : ____________</span></div>`,`Fiche Notes - ${matiere?.nom}`);
  };

  if(data.classes.length===0||data.matieres.length===0) return <Card><Empty icon="📝" text="Créez d'abord des classes et matières."/></Card>;
  if(isProf&&autorisees.length===0) return <Card><Empty icon="🔒" text="Aucune matière ne vous est attribuée. Demandez à l'administrateur de vous attribuer vos matières."/></Card>;

  return(
    <div>
      <SHdr title="Saisie des notes 📝" sub="Par période, classe et matière" action={
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {dirty&&<span style={{fontSize:11,color:"#c2410c",fontWeight:700,background:"#fff7ed",padding:"5px 11px",borderRadius:8,border:"1px solid #fed7aa"}}>● Non enregistré</span>}
          <Btn ch="🖨️ Fiche" v="ghost" onClick={printFiche}/>
          <Btn ch={saving?"⏳ Sync...":(dirty?"💾 Enregistrer":"✓ Enregistré")} v={dirty?"success":"ghost"} onClick={saveAll} disabled={saving||!dirty}/>
        </div>
      }/>
      <Card s={{marginBottom:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:13}}>
          <Slt label="Période" value={periode} onChange={e=>setPeriode(e.target.value)} opts={periodes}/>
          <Slt label="Classe" value={classeId} onChange={e=>{setClasseId(e.target.value);}} opts={data.classes.map(c=>({v:c.id,l:c.nom}))}/>

            <div style={{background:"#fff",borderRadius:14,padding:"13px 16px",border:"1px solid #eef2f7"}}><div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase"}}>Plus haute</div><div style={{fontSize:21,fontWeight:900,color:"#059669",fontFamily:"'Sora',sans-serif"}}>{plusHaut!=null?plusHaut:"—"}</div></div>
            <div style={{background:"#fff",borderRadius:14,padding:"13px 16px",border:"1px solid #eef2f7"}}><div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase"}}>Plus basse</div><div style={{fontSize:21,fontWeight:900,color:"#dc2626",fontFamily:"'Sora',sans-serif"}}>{plusBas!=null?plusBas:"—"}</div></div>

            </div>

                  <td style={{padding:"9px 13px"}}>{m&&<span style={{background:m.bg,color:m.c,borderRadius:7,padding:"3px 9px",fontSize:11,fontWeight:700}}>{m.t}</span>}</td>

}

// ── BULLETINS ─────────────────────────────────────────────────────────────────

    const classmates=data.eleves.filter(x=>x.classe_id===e.classe_id);

    const lignes=data.matieres.map((mat,i)=>{const note=e.notes?.[p]?.[mat.id];const app=note!=null&&note!==""?MENTION(note,bareme):{t:"Non noté",c:"#94a3b8",bg:"#f8fafc"};return`<tr style="background:${i%2===0?"#f8fafc":"#fff"}"><td>${mat.nom}</td><td style="text-align:center">×${mat.coefficient}</td><td style="text-align:center;font-weight:900;font-size:16px;color:${app.c}">${note!=null&&note!==""?note:"—"}</td><td style="text-align:center">${note!=null&&note!==""?(parseFloat(note)*mat.coefficient).toFixed(2):"—"}</td><td style="text-align:center"><span style="background:${app.bg};color:${app.c};padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700">${app.t}</span></td></tr>`;}).join("");
    return`${officialHeader(etab,{classe:cl?.nom,docTitle:`Bulletin de notes — ${p}`})}
    ${etab.devise_txt?`<p style="text-align:center;font-style:italic;color:#64748b;margin:0 0 10px">${etab.devise_txt}</p>`:""}

    ${(e.pere||e.mere||e.tuteur)?`<div class="grid" style="grid-template-columns:1fr 1fr;margin-top:-6px">${e.pere?`<div><div style="font-size:10px;color:#666;text-transform:uppercase">Père</div><b>${e.pere}</b>${e.tel_pere?` <span style="color:#64748b;font-weight:400">(${e.tel_pere})</span>`:""}</div>`:""}${e.mere?`<div><div style="font-size:10px;color:#666;text-transform:uppercase">Mère</div><b>${e.mere}</b>${e.tel_mere?` <span style="color:#64748b;font-weight:400">(${e.tel_mere})</span>`:""}</div>`:""}${e.tuteur?`<div><div style="font-size:10px;color:#666;text-transform:uppercase">Tuteur</div><b>${e.tuteur}</b>${e.telephone?` <span style="color:#64748b;font-weight:400">(${e.telephone})</span>`:""}</div>`:""}</div>`:""}
    <table><tr><th>Matière</th><th>Coeff.</th><th>Note /${bareme}</th><th>Points</th><th>Appréciation</th></tr>${lignes}</table>
    <div class="result" style="background:${m.bg};border:2px solid ${m.c}40"><div class="stat"><div class="stat-val" style="color:${m.c}">${moy}</div><div class="stat-lbl">Moyenne /${bareme}</div></div><div class="stat"><div class="stat-val" style="color:${m.c};font-size:18px">${m.t}</div><div class="stat-lbl">Mention</div></div><div class="stat"><div class="stat-val">${rang}/${classmates.length}</div><div class="stat-lbl">Rang</div></div></div>
    <div class="sign"><span>Le/La Directeur(trice) : ____________________</span><span>Cachet & Signature</span></div>
    <p style="text-align:center;font-size:10px;color:#cbd5e1;margin-top:16px">Généré par MonEcole · ${etab.email||""}</p>`;
  };

  if(selected){
    const e=selected;const moy=calcMoy(e.notes||{},data.matieres,periode);
    const cl=data.classes.find(c=>c.id===e.classe_id);
    const bareme=baremeOf(cl?.niveau);const m=MENTION(moy,bareme);
    const classmates=data.eleves.filter(x=>x.classe_id===e.classe_id);
    const rang=classmates.map(x=>({id:x.id,moy:parseFloat(calcMoy(x.notes||{},data.matieres,periode))||0})).sort((a,b)=>b.moy-a.moy).findIndex(x=>x.id===e.id)+1;
    return(
      <div>
        <div style={{display:"flex",gap:9,marginBottom:18,alignItems:"center"}}>
          <Btn ch="← Retour" v="ghost" onClick={()=>setSelected(null)}/>
          <select value={periode} onChange={ev=>setPeriode(ev.target.value)} style={{padding:"8px 11px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{periodes.map(p=><option key={p} value={p}>{p}</option>)}</select>
          <Btn ch="🖨️ Imprimer" v="primary" onClick={()=>printHTML(bulletinHTML(e,periode),`Bulletin ${e.prenom} ${e.nom}`)}/>
        </div>
        <div style={{background:"#fff",borderRadius:18,padding:32,maxWidth:720,margin:"0 auto",boxShadow:"0 4px 24px rgba(0,0,0,0.08)",border:"1.5px solid #e2e8f0"}}>
          <div style={{textAlign:"center",borderBottom:"3px solid #1a56db",paddingBottom:14,marginBottom:18}}>
            <div style={{fontWeight:900,fontSize:18,color:"#0f172a"}}>{etab.nom}</div>
            {etab.devise_txt&&<div style={{fontSize:12,color:"#64748b",fontStyle:"italic",marginTop:2}}>{etab.devise_txt}</div>}
            <div style={{fontSize:11,color:"#94a3b8",marginTop:5}}>{etab.adresse} {etab.telephone&&`· ${etab.telephone}`}</div>
            <div style={{marginTop:10,display:"inline-block",background:"#1a56db",color:"#fff",borderRadius:8,padding:"5px 16px",fontWeight:800,fontSize:12}}>BULLETIN — {periode.toUpperCase()} — {etab.annee}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12,marginBottom:18,background:"#f8fafc",borderRadius:11,padding:14}}>
            {[["Élève",`${e.prenom} ${e.nom}`],["Matricule",e.matricule],["Classe",cl?.nom],["Année",etab.annee]].map(([k,v])=>(<div key={k}><div style={{fontSize:9,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",marginBottom:2}}>{k}</div><div style={{fontWeight:700,fontSize:12,color:"#0f172a"}}>{v}</div></div>))}
          </div>
          <table style={{width:"100%",borderCollapse:"collapse",marginBottom:18}}>
            <thead><tr style={{background:"#1a56db"}}>{["Matière","Coeff.",`Note /${bareme}`,"Points","Appréciation"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left",fontSize:11,fontWeight:700,color:"#fff"}}>{h}</th>)}</tr></thead>
            <tbody>{data.matieres.map((mat,i)=>{const note=e.notes?.[periode]?.[mat.id];const app=note!=null&&note!==""?MENTION(note,bareme):{t:"Non noté",c:"#94a3b8",bg:"#f8fafc"};return(<tr key={mat.id} style={{background:i%2===0?"#f8fafc":"#fff",borderBottom:"1px solid #e2e8f0"}}><td style={{padding:"8px 12px",fontWeight:600,fontSize:12}}>{mat.nom}</td><td style={{padding:"8px 12px",fontSize:12,color:"#64748b"}}>×{mat.coefficient}</td><td style={{padding:"8px 12px",fontWeight:800,fontSize:15,color:app.c}}>{note!=null&&note!==""?note:"—"}</td><td style={{padding:"8px 12px",fontSize:12,color:"#475569"}}>{note!=null&&note!==""?(parseFloat(note)*mat.coefficient).toFixed(2):"—"}</td><td style={{padding:"8px 12px"}}><span style={{background:app.bg,color:app.c,borderRadius:5,padding:"2px 7px",fontSize:10,fontWeight:700}}>{app.t}</span></td></tr>);})}</tbody>
          </table>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,background:m.bg,borderRadius:11,padding:16,border:`2px solid ${m.c}40`}}>
            <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#94a3b8",fontWeight:700,textTransform:"uppercase"}}>Moyenne</div><div style={{fontSize:26,fontWeight:900,color:m.c}}>{moy}<span style={{fontSize:12}}>/{bareme}</span></div></div>
            <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#94a3b8",fontWeight:700,textTransform:"uppercase"}}>Mention</div><div style={{fontSize:16,fontWeight:800,color:m.c}}>{m.t}</div></div>
            <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#94a3b8",fontWeight:700,textTransform:"uppercase"}}>Rang</div><div style={{fontSize:26,fontWeight:900,color:"#0f172a"}}>{rang}<span style={{fontSize:12}}>/{classmates.length}</span></div></div>
          </div>
        </div>
      </div>
    );
  }
  return(
    <div>
      <SHdr title="Bulletins 📄" sub="Consultez et imprimez" action={
        <div style={{display:"flex",gap:8}}>
          <select value={periode} onChange={e=>setPeriode(e.target.value)} style={{padding:"8px 11px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{periodes.map(p=><option key={p} value={p}>{p}</option>)}</select>
          <select value={filterCl} onChange={e=>setFilterCl(e.target.value)} style={{padding:"8px 11px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:12,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}><option value="">Toutes classes</option>{data.classes.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}</select>

        </div>

      {data.eleves.length===0?<Card><Empty icon="📄" text="Aucun élève."/></Card>:(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {filtered.map(e=>{const moy=calcMoy(e.notes||{},data.matieres,periode);const cl=data.classes.find(c=>c.id===e.classe_id);const bareme=baremeOf(cl?.niveau);const m=MENTION(moy,bareme);return(
            <div key={e.id} onClick={()=>setSelected(e)} style={{background:"#fff",borderRadius:12,padding:"13px 17px",boxShadow:"0 1px 6px rgba(0,0,0,0.05)",border:"1.5px solid #f1f5f9",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",transition:"all 0.15s"}} onMouseOver={ev=>{ev.currentTarget.style.borderColor="#1a56db";}} onMouseOut={ev=>{ev.currentTarget.style.borderColor="#f1f5f9";}}>
              <div style={{display:"flex",alignItems:"center",gap:11}}>
                <div style={{width:36,height:36,borderRadius:10,background:"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:"#1a56db",fontSize:12}}>{e.prenom?.[0]}{e.nom?.[0]}</div>
                <div><div style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>{e.prenom} {e.nom}</div><div style={{fontSize:11,color:"#94a3b8"}}>{cl?.nom} · {e.matricule}</div></div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:13}}>
                <div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:16,color:m.c}}>{moy}/{bareme}</div><span style={{background:m.bg,color:m.c,borderRadius:5,padding:"1px 7px",fontSize:10,fontWeight:700}}>{m.t}</span></div>
                <span style={{color:"#cbd5e1",fontSize:17}}>›</span>
              </div>

          })}
        </div>
      )}
    </div>
  );
}

// ── PAIEMENTS ─────────────────────────────────────────────────────────────────
function Paiements({data,ops,etab}) {
  const devise=etab.devise||"GNF";
  const echeances=echeancesList(etab);
  const isTranche=(etab.mode_paiement||"mensualite")==="tranche";
  const [modal,setModal]=useState(null);
  const [selEleve,setSelEleve]=useState("");
  const [payCycle,setPayCycle]=useState("Primaire");
  const [form,setForm]=useState({eleve_id:"",type:"Scolarité",montant:"",date:TODAY,mois:"",note:"",moyen:""});
  const [loading,setLoading]=useState(false);
  const [recuPret,setRecuPret]=useState(null);

  // Paiements d'un élève pour une échéance donnée
  const payeEcheance=(eleveId,ech)=>data.paiements.filter(p=>p.eleve_id===eleveId&&p.mois===ech).reduce((s,p)=>s+(p.montant||0),0);
  const totalPayeEleve=(eleveId)=>data.paiements.filter(p=>p.eleve_id===eleveId&&p.type!=="Frais d'inscription"&&p.type!=="Frais d'examen").reduce((s,p)=>s+(p.montant||0),0);

  const save=async()=>{
    if(!form.eleve_id||!form.montant)return;setLoading(true);
    const el=data.eleves.find(e=>e.id===parseInt(form.eleve_id));
    const created=await ops.addPaiement({...form,eleve_id:parseInt(form.eleve_id),montant:parseFloat(form.montant),eleve_nom:`${el?.prenom} ${el?.nom}`,matricule:el?.matricule});
    setLoading(false);setModal(null);
    if(created)setRecuPret(created);
  };

  // Construit le HTML du reçu (réutilisé pour impression, PDF, aperçu)
  const recuHTML=(p)=>{
    const el=data.eleves.find(e=>e.id===p.eleve_id);const cl=data.classes.find(c=>c.id===el?.classe_id);
    const annuel=fraisAnnuelEleve(el,etab,cl);const payeTot=totalPayeEleve(p.eleve_id);const resteAn=Math.max(0,annuel-payeTot);
    const payeEch=p.mois?payeEcheance(p.eleve_id,p.mois):0;const partEch=isTranche?(annuel/echeances.length):(parseFloat(cl?.mensualite_classe)||parseFloat(etab.mensualite)||(annuel>0?annuel/echeances.length:0));
    const resteEch=p.mois&&partEch?Math.max(0,partEch-payeEch):null;
    const row=(k,v,hi)=>`<div style="display:flex;justify-content:space-between;padding:3px 0;${hi?"color:#c2410c;font-weight:700":"color:#334155"}"><span style="color:#94a3b8;font-size:10px;text-transform:uppercase;letter-spacing:.3px">${k}</span><span style="font-weight:600">${v}</span></div>`;
    return `<div class="recu">
      <div class="recu-officiel">
        <div class="recu-pays">${etab.pays||"République de Guinée"}</div>
        <div class="recu-devise">${etab.devise_nationale||"Travail · Justice · Solidarité"}</div>
        <div class="recu-minist">${etab.ministere||"Ministère de l'Éducation Nationale et de l'Alphabétisation"}</div>
        ${(etab.ire||etab.dpe)?`<div class="recu-iredpe">${etab.ire?`IRE : ${etab.ire}`:""}${etab.ire&&etab.dpe?" · ":""}${etab.dpe?`DPE : ${etab.dpe}`:""}</div>`:""}
      </div>
      <div class="recu-head">
        ${etab.logo?`<img src="${etab.logo}" class="recu-logo"/>`:`<div class="recu-logo recu-logo-ph">🎓</div>`}
        <div style="flex:1">
          <div style="font-weight:800;font-size:14px;color:#0f172a;line-height:1.1">${etab.nom||""}</div>
          <div style="font-size:9px;color:#64748b">${etab.adresse?etab.adresse+" · ":""}${etab.telephone||""}${etab.codeMEN?" · Code MEN: "+etab.codeMEN:""}</div>
        </div>
        <div class="recu-badge">REÇU</div>
      </div>
      <div class="recu-num"><span>N° <b style="font-family:monospace">${p.recu}</b></span><span>${p.date}</span></div>
      <div class="recu-grid">
        ${row("Élève",`${el?.prenom||""} ${el?.nom||""}`)}
        ${row("Matricule",el?.matricule||"—")}
        ${row("Classe",cl?.nom||"—")}
        ${row("Type",p.type)}
        ${p.moyen?row("Moyen",p.moyen):""}
        ${p.mois?row(isTranche?"Tranche":"Mois",p.mois):""}
      </div>
      <div class="recu-montant"><span>Montant versé</span><b>${fmtMoney(p.montant,devise)}</b></div>
      ${(resteEch!=null||annuel>0)?`<div class="recu-solde">
        ${resteEch!=null?row(`Reste ${p.mois}`,fmtMoney(resteEch,devise),true):""}
        ${annuel>0?row("Reste annuel",fmtMoney(resteAn,devise),true):""}
      </div>`:""}
      <div class="recu-foot"><span>Comptable : ____________</span><span>Cachet & Signature</span></div>
    </div>`;
  };
  const printRecu=(p)=>printHTML(recuHTML(p),`Reçu ${p.recu}`,{compact:true});
  // Texte récapitulatif pour WhatsApp / Mail
  const recuTexte=(p)=>{
    const el=data.eleves.find(e=>e.id===p.eleve_id);const cl=data.classes.find(c=>c.id===el?.classe_id);
    const annuel=fraisAnnuelEleve(el,etab,cl);const resteAn=Math.max(0,annuel-totalPayeEleve(p.eleve_id));
    return `*${etab.nom||"MonEcole"}* — Reçu ${p.recu}\n`+
      `Élève : ${el?.prenom||""} ${el?.nom||""} (${el?.matricule||""})\n`+
      `Classe : ${cl?.nom||"—"}\n`+
      `Type : ${p.type}${p.mois?" — "+p.mois:""}\n`+
      (p.moyen?`Moyen : ${p.moyen}\n`:"")+
      `Montant versé : ${fmtMoney(p.montant,devise)}\n`+
      (annuel>0?`Reste annuel : ${fmtMoney(resteAn,devise)}\n`:"")+
      `Date : ${p.date}\nMerci.`;
  };
  // Télécharger le reçu en PDF (via la fenêtre d'impression -> Enregistrer en PDF)
  const pdfRecu=(p)=>printHTML(recuHTML(p),`Recu_${p.recu}`,{compact:true});
  const waRecu=(p)=>{
    const el=data.eleves.find(e=>e.id===p.eleve_id);
    const tel=(el?.telephone||"").replace(/[^0-9]/g,"");
    const txt=encodeURIComponent(recuTexte(p));
    window.open(tel?`https://wa.me/${tel}?text=${txt}`:`https://wa.me/?text=${txt}`,"_blank");
  };
  const mailRecu=(p)=>{
    const el=data.eleves.find(e=>e.id===p.eleve_id);
    const sujet=encodeURIComponent(`Reçu ${p.recu} — ${etab.nom||"MonEcole"}`);
    const corps=encodeURIComponent(recuTexte(p).replace(/\*/g,""));
    window.open(`mailto:${el?.email||""}?subject=${sujet}&body=${corps}`,"_blank");
  };

  const totalEncaisse=data.paiements.reduce((s,p)=>s+(p.montant||0),0);

  // Vue détail d'un élève
  if(selEleve){
    const el=data.eleves.find(e=>e.id===parseInt(selEleve));
    const cl=data.classes.find(c=>c.id===el?.classe_id);
    const annuel=fraisAnnuelEleve(el,etab,cl);
    const mensuelCl=parseFloat(cl?.mensualite_classe)||0;
    const partEch=isTranche?(annuel>0?annuel/echeances.length:0):(mensuelCl||(annuel>0?annuel/echeances.length:0));
    const payeScol=totalPayeEleve(el.id);
    const insc=fraisInscEleve(el,etab,cl);
    const payeInsc=data.paiements.filter(p=>p.eleve_id===el.id&&p.type==="Frais d'inscription").reduce((s,p)=>s+(p.montant||0),0);
    const resteInsc=Math.max(0,insc-payeInsc);
    const totalDu=annuel+insc;const totalPaye=payeScol+payeInsc;const resteTotal=Math.max(0,totalDu-totalPaye);
    const histo=data.paiements.filter(p=>p.eleve_id===el.id).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    return(
      <div>
        <div style={{display:"flex",gap:9,marginBottom:16,alignItems:"center"}}>
          <Btn ch="← Retour" v="ghost" onClick={()=>setSelEleve("")}/>
          <div style={{flex:1}}><div style={{fontWeight:800,fontSize:16,color:"#0f172a"}}>{el.prenom} {el.nom}</div><div style={{fontSize:12,color:"#94a3b8"}}>{cl?.nom} · {el.matricule}</div></div>
          <Btn ch="+ Encaisser" v="primary" onClick={()=>{setForm({eleve_id:el.id,type:"Scolarité",montant:"",date:TODAY,mois:echeances[0]||"",note:""});setModal("add");}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}}>
          <Card s={{padding:16}}><div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase"}}>Total dû (insc. + scol.)</div><div style={{fontSize:20,fontWeight:900,color:"#0f172a"}}>{fmtMoney(totalDu,devise)}</div></Card>
          <Card s={{padding:16}}><div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase"}}>Payé</div><div style={{fontSize:20,fontWeight:900,color:"#059669"}}>{fmtMoney(totalPaye,devise)}</div></Card>
          <Card s={{padding:16}}><div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase"}}>Reste total</div><div style={{fontSize:20,fontWeight:900,color:resteTotal>0?"#c2410c":"#059669"}}>{fmtMoney(resteTotal,devise)}</div></Card>
        </div>
        {insc>0&&<Card s={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:800,fontSize:13,color:"#0f172a"}}>🎫 Frais d'inscription {resteInsc===0&&<span style={{color:"#059669",fontSize:11}}>✓ Réglé</span>}</div>
              <div style={{fontSize:12,color:"#64748b",marginTop:3}}>Payé {fmtMoney(payeInsc,devise)} / {fmtMoney(insc,devise)}{resteInsc>0&&<span style={{color:"#c2410c"}}> · Reste {fmtMoney(resteInsc,devise)}</span>}</div>
            </div>
            {resteInsc>0&&<Btn ch="Payer inscription" v="ghost" s={{padding:"6px 13px",fontSize:11}} onClick={()=>{setForm({eleve_id:el.id,type:"Frais d'inscription",montant:resteInsc||"",date:TODAY,mois:"",note:""});setModal("add");}}/>}
          </div>
        </Card>}
        <Card s={{marginBottom:14}}>
          <div style={{fontWeight:800,fontSize:13,color:"#0f172a",marginBottom:12}}>📅 Suivi par {isTranche?"tranche":"mois"}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {echeances.map(ech=>{
              const paye=payeEcheance(el.id,ech);const reste=partEch?Math.max(0,partEch-paye):0;const pct=partEch?Math.min(100,Math.round(paye/partEch*100)):0;
              const solde=partEch>0&&paye>=partEch;
              return(<div key={ech} style={{border:"1px solid #f1f5f9",borderRadius:10,padding:"10px 13px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>{ech} {solde&&<span style={{color:"#059669",fontSize:11}}>✓ Soldé</span>}</div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:12,color:"#64748b"}}>{fmtMoney(paye,devise)}{partEch?` / ${fmtMoney(partEch,devise)}`:""}</span>
                    <Btn ch="Payer" v="ghost" s={{padding:"5px 12px",fontSize:11}} onClick={()=>{setForm({eleve_id:el.id,type:"Scolarité",montant:reste||"",date:TODAY,mois:ech,note:""});setModal("add");}}/>
                  </div>
                </div>
                {partEch>0&&<div style={{height:7,background:"#f1f5f9",borderRadius:5,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:solde?"#10b981":"#1a56db",transition:"width .3s"}}/></div>}
                {partEch>0&&reste>0&&<div style={{fontSize:11,color:"#c2410c",marginTop:4}}>Reste : {fmtMoney(reste,devise)}</div>}
              </div>);
            })}
          </div>
        </Card>
        <Card>
          <div style={{fontWeight:800,fontSize:13,color:"#0f172a",marginBottom:12}}>🧾 Historique des versements</div>
          {histo.length===0?<Empty icon="💰" text="Aucun versement."/>:(
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:"#f8fafc"}}>{["Reçu","Type",isTranche?"Tranche":"Mois","Montant","Date",""].map(h=><th key={h} style={{padding:"8px 11px",textAlign:"left",fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
              <tbody>{histo.map(p=>(<tr key={p.id} style={{borderTop:"1px solid #f8fafc"}}>

                <td style={{padding:"8px 11px",fontSize:12}}>{p.type}</td>

                <td style={{padding:"8px 11px",fontSize:12,color:"#64748b"}}>{p.date}</td>
                <td style={{padding:"8px 11px"}}><div style={{display:"flex",gap:6}}>
                  <button onClick={()=>printRecu(p)} style={{background:"#eff6ff",color:"#1a56db",border:"none",borderRadius:7,padding:"4px 9px",cursor:"pointer",fontSize:11,fontWeight:700}}>🖨️</button>
                  <button onClick={()=>ops.deletePaiement(p.id)} style={{background:"#fef2f2",color:"#dc2626",border:"none",borderRadius:7,padding:"4px 9px",cursor:"pointer",fontSize:11,fontWeight:700}}>🗑️</button>
                </div></td>
              </tr>))}</tbody>
            </table>
          )}
        </Card>
        {modal&&<PaiementModal {...{form,setForm,echeances,isTranche,devise,loading,save,setModal,moyens:etab.moyens_paiement||[]}}/>}
        {recuPret&&<RecuApercu html={recuHTML(recuPret)} onClose={()=>setRecuPret(null)} onPrint={()=>printRecu(recuPret)} onPdf={()=>pdfRecu(recuPret)} onWa={()=>waRecu(recuPret)} onMail={()=>mailRecu(recuPret)}/>}
      </div>
    );
  }

  // Vue liste groupée par cycle et classe
  const ligneEleve=(el)=>{
    const cl=data.classes.find(c=>c.id===el.classe_id);
    const insc=fraisInscEleve(el,etab,cl);
    const payeInsc=data.paiements.filter(p=>p.eleve_id===el.id&&p.type==="Frais d'inscription").reduce((s,p)=>s+(p.montant||0),0);
    const annuel=fraisAnnuelEleve(el,etab,cl)+insc;const paye=totalPayeEleve(el.id)+payeInsc;const reste=Math.max(0,annuel-paye);
    const solde=annuel>0&&paye>=annuel;const pct=annuel?Math.min(100,Math.round(paye/annuel*100)):0;
    return(<tr key={el.id} style={{borderTop:"1px solid #f8fafc",cursor:"pointer"}} onClick={()=>setSelEleve(String(el.id))} onMouseOver={e=>{e.currentTarget.style.background="#f8fafc";}} onMouseOut={e=>{e.currentTarget.style.background="transparent";}}>
      <td style={{padding:"10px 14px"}}><div style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>{el.prenom} {el.nom}</div><div style={{fontSize:11,color:"#94a3b8"}}>{el.matricule}</div></td>
      <td style={{padding:"10px 8px",fontSize:12}}>{fmtMoney(annuel,devise)}</td>
      <td style={{padding:"10px 8px",fontSize:12,fontWeight:700,color:"#059669"}}>{fmtMoney(paye,devise)}</td>
      <td style={{padding:"10px 8px",fontSize:12,fontWeight:700,color:reste>0?"#c2410c":"#059669"}}>{fmtMoney(reste,devise)}</td>
      <td style={{padding:"10px 8px"}}>{annuel>0?<div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:54,height:6,background:"#f1f5f9",borderRadius:4,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:solde?"#10b981":"#1a56db"}}/></div><span style={{fontSize:11,fontWeight:700,color:solde?"#059669":"#64748b"}}>{pct}%</span></div>:<span style={{fontSize:11,color:"#cbd5e1"}}>—</span>}</td>
      <td style={{padding:"10px 14px",color:"#cbd5e1",fontSize:16,textAlign:"right"}}>›</td>
    </tr>);
  };
  const classesCycle=data.classes.filter(c=>(c.niveau||"Primaire")===payCycle);
  return(
    <div>
      <SHdr title="Paiements 💰" sub={`Total encaissé : ${fmtMoney(totalEncaisse,devise)} · Mode : ${isTranche?"Tranches":"Mensualités"}`}/>
      {data.eleves.length===0?<Card><Empty icon="💰" text="Inscrivez des élèves d'abord."/></Card>:(<>
        {/* Onglets cycles */}
        <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
          {CYCLES.map(cyc=>{const actif=payCycle===cyc;const n=data.eleves.filter(e=>{const c=data.classes.find(x=>x.id===e.classe_id);return (c?.niveau||"Primaire")===cyc;}).length;return(
            <button key={cyc} onClick={()=>setPayCycle(cyc)} style={{padding:"9px 16px",borderRadius:11,border:actif?"2px solid #1a56db":"1.5px solid #e2e8f0",background:actif?"#eff6ff":"#fff",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,fontWeight:800,color:actif?"#1a56db":"#64748b"}}>{cyc==="Maternelle"?"🟨":cyc==="Primaire"?"🟦":cyc==="Collège"?"🟪":"🟩"} {cyc} <span style={{fontSize:11,opacity:.7}}>({n})</span></button>
          );})}
        </div>
        {classesCycle.length===0?<Card><Empty icon="🏫" text={`Aucune classe en ${payCycle}.`}/></Card>:(
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            {classesCycle.map(cl=>{
              const elevesClasse=data.eleves.filter(e=>e.classe_id===cl.id);
              const fraisCl=fraisAnnuelEleve({},etab,cl);
              // Totaux classe
              let totDu=0,totPaye=0;
              elevesClasse.forEach(el=>{const insc=fraisInscEleve(el,etab,cl);const pInsc=data.paiements.filter(p=>p.eleve_id===el.id&&p.type==="Frais d'inscription").reduce((s,p)=>s+(p.montant||0),0);totDu+=fraisAnnuelEleve(el,etab,cl)+insc;totPaye+=totalPayeEleve(el.id)+pInsc;});
              const totReste=Math.max(0,totDu-totPaye);
              return(
                <Card key={cl.id} s={{padding:0,overflow:"hidden"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 18px",background:"#f8fafc",borderBottom:"1px solid #eef2f7",flexWrap:"wrap",gap:8}}>
                    <div>
                      <div style={{fontWeight:800,fontSize:14,color:"#0f172a"}}>🏫 {cl.nom} <span style={{fontWeight:600,fontSize:12,color:"#94a3b8"}}>· {elevesClasse.length} élève(s)</span></div>
                      <div style={{fontSize:11,color:"#059669",fontWeight:600,marginTop:2}}>💰 Scolarité {fraisCl>0?fmtMoney(fraisCl,devise):"non définie"}/an{cl.frais_inscription_classe?` · Inscription ${fmtMoney(cl.frais_inscription_classe,devise)}`:""}</div>
                    </div>
                    <div style={{textAlign:"right",fontSize:11}}>
                      <div style={{color:"#64748b"}}>Encaissé : <b style={{color:"#059669"}}>{fmtMoney(totPaye,devise)}</b></div>
                      <div style={{color:"#64748b"}}>Reste : <b style={{color:totReste>0?"#c2410c":"#059669"}}>{fmtMoney(totReste,devise)}</b></div>
                    </div>
                  </div>
                  {elevesClasse.length===0?<div style={{padding:18,textAlign:"center",color:"#94a3b8",fontSize:12}}>Aucun élève dans cette classe.</div>:(
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead><tr style={{background:"#fff"}}>{["Élève","Total dû","Payé","Reste","Statut",""].map(h=><th key={h} style={{padding:"8px 8px",textAlign:"left",fontSize:10,fontWeight:700,color:"#cbd5e1",textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
                      <tbody>{elevesClasse.map(ligneEleve)}</tbody>
                    </table>
                  )}
                </Card>
              );
            })}
          </div>
        )}
      </>)}
      {modal&&<PaiementModal {...{form,setForm,echeances,isTranche,devise,loading,save,setModal,moyens:etab.moyens_paiement||[]}}/>}
        {recuPret&&<RecuApercu html={recuHTML(recuPret)} onClose={()=>setRecuPret(null)} onPrint={()=>printRecu(recuPret)} onPdf={()=>pdfRecu(recuPret)} onWa={()=>waRecu(recuPret)} onMail={()=>mailRecu(recuPret)}/>}
    </div>
  );
}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginTop:18}}>
            <Btn ch="🖨️ Imprimer" v="primary" onClick={onPrint}/>
            <Btn ch="📄 Télécharger PDF" v="ghost" onClick={onPdf}/>
            <Btn ch="🟢 WhatsApp" v="success" onClick={onWa}/>

          </div>
          <div style={{fontSize:10,color:"#94a3b8",textAlign:"center",marginTop:10}}>Pour WhatsApp/Mail : le message s'ouvre pré-rempli. Téléchargez le PDF puis joignez-le si besoin.</div>

// Modal de saisie d'un versement (réutilisé)

    <Modal title="Encaisser un versement" onClose={()=>setModal(null)}>
      <Slt label="Type" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))} opts={["Scolarité","Frais d'inscription","Frais d'examen","Autre"]}/>
      {form.type==="Scolarité"&&<Slt label={isTranche?"Tranche concernée":"Mois concerné"} value={form.mois} onChange={e=>setForm(f=>({...f,mois:e.target.value}))} opts={echeances.map(x=>({v:x,l:x}))}/>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 13px"}}>
        <Inp label={`Montant versé (${devise}) *`} type="number" value={form.montant} onChange={e=>setForm(f=>({...f,montant:e.target.value}))}/>

      </div>
      {moyens.length>0&&<Slt label="Moyen de paiement" value={form.moyen} onChange={e=>setForm(f=>({...f,moyen:e.target.value}))} opts={[{v:"",l:"— Choisir —"},...moyens.map(m=>({v:m,l:m}))]}/>}
      <Inp label="Note (facultatif)" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="Versement partiel, etc."/>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn ch="Annuler" v="ghost" onClick={()=>setModal(null)}/><Btn ch={loading?"...":"💾 Enregistrer"} v="success" onClick={save} disabled={loading}/></div>
    </Modal>
  );
}

// ── PRÉSENCES ─────────────────────────────────────────────────────────────────
function Presences({data,ops,etab}) {
  const [date,setDate]=useState(TODAY);const [classeId,setClasseId]=useState(data.classes[0]?.id||"");
  const eleves=data.eleves.filter(e=>e.classe_id===parseInt(classeId));
  const getP=(eleveId)=>{const p=data.presences.find(p=>p.eleve_id===eleveId&&p.date===date&&p.classe_id===parseInt(classeId));return p?.present??true;};
  const absents=eleves.filter(e=>!getP(e.id));
  const absHist=data.eleves.map(e=>({...e,tot:data.presences.filter(p=>p.eleve_id===e.id&&!p.present).length})).filter(e=>e.tot>0).sort((a,b)=>b.tot-a.tot);
  return(
    <div>

      {eleves.length===0?<Card><Empty icon="📅" text="Sélectionnez une classe."/></Card>:(
        <Card s={{marginBottom:16}}>

                <div style={{display:"flex",alignItems:"center",gap:9}}>
                  <div style={{width:30,height:30,borderRadius:8,background:present?"#dcfce7":"#fee2e2",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:present?"#059669":"#dc2626",fontSize:11}}>{e.prenom?.[0]}{e.nom?.[0]}</div>
                  <div style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>{e.prenom} {e.nom}</div>
                </div>
                <span style={{fontSize:12,fontWeight:700,color:present?"#059669":"#dc2626"}}>{present?"✅ Présent":"❌ Absent"}</span>

        <Tbl cols={["Élève","Classe","Total"]} empty={null} rows={absHist.slice(0,10).map(e=>{const cl=data.classes.find(c=>c.id===e.classe_id);return(<TR key={e.id}><TD bold>{e.prenom} {e.nom}</TD><TD>{cl?.nom}</TD><TD><span style={{background:e.tot>=5?"#fee2e2":"#fef3c7",color:e.tot>=5?"#dc2626":"#d97706",borderRadius:7,padding:"2px 10px",fontSize:12,fontWeight:700}}>{e.tot} absence(s)</span></TD></TR>);})}/>

// ── MESSAGERIE ────────────────────────────────────────────────────────────────
function Messagerie({data,ops,currentUser}) {
  const me=currentUser||{};
  const myName=`${me.prenom||""} ${me.nom||""}`.trim();
  const autres=(data.utilisateurs||[]).filter(u=>u.id!==me.id);
  // Construire la liste des conversations : Général + groupes dont je suis membre + DMs existants
  const dmKey=(a,b)=>"dm:"+[a,b].sort((x,y)=>x-y).join("-");
  const groupes=(data.conversations||[]).filter(g=>Array.isArray(g.membres)&&(g.membres.includes(me.id)||me.role==="Administrateur"));
  const [active,setActive]=useState("general");
  const [msg,setMsg]=useState("");
  const [modalGroupe,setModalGroupe]=useState(false);
  const [grpNom,setGrpNom]=useState("");const [grpMembres,setGrpMembres]=useState([]);
  const [newDm,setNewDm]=useState(false);
  const [pending,setPending]=useState([]); // fichiers sélectionnés à envoyer
  const [uploading,setUploading]=useState(false);
  const fileRef=useRef(null);
  const endRef=useRef(null);

  // Messages de la conversation active
  const msgs=(data.messages||[]).filter(m=>(m.conversation||"general")===active);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[data.messages,active]);

  const pickFiles=async(e)=>{
    const files=Array.from(e.target.files||[]);
    if(files.length===0)return;
    const trop=files.find(f=>f.size>15*1024*1024);
    if(trop){alert("Fichier trop volumineux (max 15 Mo) : "+trop.name);return;}
    setUploading(true);
    const ups=[];
    for(const f of files){const r=await ops.uploadFichier(f);if(r)ups.push(r);}
    setPending(p=>[...p,...ups]);setUploading(false);
    if(fileRef.current)fileRef.current.value="";
  };
  const send=()=>{if(!msg.trim()&&pending.length===0)return;ops.sendMessage(myName,me.role,msg.trim(),active,me.id,pending);setMsg("");setPending([]);};
  const toggleMembre=id=>setGrpMembres(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const creerGroupe=async()=>{
    if(!grpNom.trim()||grpMembres.length===0)return;
    const membres=[...new Set([...grpMembres,me.id])];
    const g=await ops.addGroupe(grpNom.trim(),membres);
    if(g){setModalGroupe(false);setGrpNom("");setGrpMembres([]);setActive("group:"+g.id);}
  };

  // Titre de la conversation active
  const activeTitle=(()=>{
    if(active==="general")return "💬 Général (tout le monde)";
    if(active.startsWith("group:")){const g=groupes.find(x=>"group:"+x.id===active);return "👥 "+(g?.nom||"Groupe");}
    if(active.startsWith("dm:")){const ids=active.slice(3).split("-").map(Number);const other=ids.find(i=>i!==me.id);const u=(data.utilisateurs||[]).find(x=>x.id===other);return "👤 "+(u?`${u.prenom} ${u.nom}`:"Privé");}
    return "Conversation";
  })();

  const ConvBtn=({id,label,sub,active:act,onClick})=>(
    <button onClick={onClick} className="me-nav" style={{width:"100%",textAlign:"left",padding:"10px 12px",borderRadius:10,border:"none",cursor:"pointer",background:act?"#eff6ff":"transparent",marginBottom:3,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
      <div style={{fontWeight:700,fontSize:12.5,color:act?"#1a56db":"#0f172a"}}>{label}</div>
      {sub&&<div style={{fontSize:10.5,color:"#94a3b8",marginTop:1}}>{sub}</div>}
    </button>
  );

  return(
    <div>
      <SHdr title="Messagerie 💬" sub="Général, messages privés et groupes · Temps réel" action={<Btn ch="+ Nouveau groupe" v="primary" onClick={()=>{setGrpNom("");setGrpMembres([]);setModalGroupe(true);}}/>}/>
      <div style={{display:"grid",gridTemplateColumns:"230px 1fr",gap:14,height:500}}>
        {/* Liste des conversations */}
        <Card s={{padding:10,overflowY:"auto"}}>
          <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",padding:"4px 8px 8px"}}>Canaux</div>
          <ConvBtn label="💬 Général" sub="Tout le monde" active={active==="general"} onClick={()=>setActive("general")}/>
          {groupes.length>0&&<div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",padding:"10px 8px 6px"}}>Groupes</div>}
          {groupes.map(g=>(
            <ConvBtn key={g.id} label={"👥 "+g.nom} sub={`${(g.membres||[]).length} membre(s)`} active={active==="group:"+g.id} onClick={()=>setActive("group:"+g.id)}/>
          ))}
          <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",padding:"10px 8px 6px"}}>Messages privés</div>
          {autres.length===0?<div style={{fontSize:11,color:"#cbd5e1",padding:"4px 8px"}}>Aucun autre membre.</div>:autres.map(u=>(
            <ConvBtn key={u.id} label={"👤 "+u.prenom+" "+u.nom} sub={u.role} active={active===dmKey(me.id,u.id)} onClick={()=>setActive(dmKey(me.id,u.id))}/>
          ))}
        </Card>

        {/* Zone de chat */}
        <Card s={{display:"flex",flexDirection:"column",padding:0,overflow:"hidden"}}>
          <div style={{padding:"12px 16px",borderBottom:"1px solid #f1f5f9",fontWeight:800,fontSize:13,color:"#0f172a"}}>{activeTitle}</div>
          <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:10}}>
            {msgs.length===0?<div style={{textAlign:"center",color:"#94a3b8",padding:"40px 0"}}><div style={{fontSize:32}}>💬</div><p style={{fontSize:13}}>Aucun message. Démarrez la conversation !</p></div>:
            msgs.map(m=>{const mine=m.auteur===myName;const fichiers=Array.isArray(m.fichiers)?m.fichiers:[];return(
              <div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:mine?"flex-end":"flex-start"}}>
                {!mine&&<div style={{fontSize:10,color:"#94a3b8",marginBottom:3}}>{m.auteur} · <Badge role={m.role}/></div>}
                {m.texte&&<div style={{maxWidth:"72%",background:mine?"linear-gradient(135deg,#1a56db,#1e40af)":"#f1f5f9",color:mine?"#fff":"#0f172a",borderRadius:mine?"15px 15px 5px 15px":"15px 15px 15px 5px",padding:"9px 13px",fontSize:13,lineHeight:1.5,boxShadow:mine?"0 3px 10px -3px rgba(26,86,219,.5)":"none"}}>{m.texte}</div>}
                {fichiers.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:m.texte?5:0,justifyContent:mine?"flex-end":"flex-start",maxWidth:"72%"}}>
                  {fichiers.map((f,k)=>{const isImg=(f.type||"").startsWith("image/");return isImg?(
                    <a key={k} href={f.url} target="_blank" rel="noreferrer"><img src={f.url} alt={f.nom} style={{maxWidth:160,maxHeight:160,borderRadius:11,border:"1px solid #e2e8f0",display:"block"}}/></a>
                  ):(
                    <a key={k} href={f.url} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:8,background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:"8px 12px",textDecoration:"none",color:"#1a56db",fontSize:12,fontWeight:700,maxWidth:200}}>📎 <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.nom}</span></a>
                  );})}
                </div>}
              </div>
            );})}
            <div ref={endRef}/>
          </div>
          <div style={{borderTop:"1px solid #f1f5f9"}}>
            {pending.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:7,padding:"10px 15px 0"}}>
              {pending.map((f,k)=>(
                <div key={k} style={{display:"flex",alignItems:"center",gap:6,background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:9,padding:"4px 6px 4px 10px",fontSize:11,fontWeight:600,color:"#1a56db",maxWidth:160}}>
                  <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(f.type||"").startsWith("image/")?"🖼️":"📎"} {f.nom}</span>
                  <button onClick={()=>setPending(p=>p.filter((_,j)=>j!==k))} style={{background:"none",border:"none",color:"#dc2626",cursor:"pointer",fontSize:12,fontWeight:800}}>✕</button>
                </div>
              ))}
            </div>}
            <div style={{padding:"12px 15px",display:"flex",gap:9,alignItems:"center"}}>
              <input ref={fileRef} type="file" multiple onChange={pickFiles} style={{display:"none"}}/>
              <button className="me-btn" onClick={()=>fileRef.current?.click()} disabled={uploading} title="Joindre des fichiers" style={{padding:"10px 13px",borderRadius:11,border:"1.5px solid #e2e8f0",background:"#fff",cursor:"pointer",fontSize:16}}>{uploading?"⏳":"📎"}</button>
              <input value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Écrire un message..." style={{flex:1,padding:"10px 14px",borderRadius:11,border:"1.5px solid #e2e8f0",fontSize:13,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}/>
              <button className="me-btn" onClick={send} disabled={(!msg.trim()&&pending.length===0)||uploading} style={{padding:"10px 18px",borderRadius:11,border:"none",background:(msg.trim()||pending.length)?"linear-gradient(135deg,#1a56db,#1e40af)":"#e2e8f0",color:(msg.trim()||pending.length)?"#fff":"#94a3b8",fontSize:14,fontWeight:700,cursor:(msg.trim()||pending.length)?"pointer":"not-allowed",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>→</button>
            </div>
          </div>
        </Card>
      </div>

      {modalGroupe&&<Modal title="Créer un groupe" onClose={()=>setModalGroupe(false)}>
        <Inp label="Nom du groupe *" value={grpNom} onChange={e=>setGrpNom(e.target.value)} placeholder="Ex: Profs 6ème Année"/>
        <Lbl t="Membres du groupe">
          {autres.length===0?<div style={{fontSize:12,color:"#94a3b8"}}>Aucun autre membre à ajouter.</div>:(
            <div style={{display:"flex",flexWrap:"wrap",gap:7,maxHeight:200,overflowY:"auto"}}>
              {autres.map(u=>{const on=grpMembres.includes(u.id);return(
                <button key={u.id} type="button" onClick={()=>toggleMembre(u.id)} style={{padding:"6px 12px",borderRadius:20,border:on?"2px solid #1a56db":"1.5px solid #e2e8f0",background:on?"#eff6ff":"#fff",color:on?"#1a56db":"#64748b",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{on?"✓ ":""}{u.prenom} {u.nom}</button>
              );})}
            </div>
          )}
          <div style={{fontSize:11,color:"#94a3b8",marginTop:6}}>Vous serez automatiquement ajouté au groupe.</div>
        </Lbl>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn ch="Annuler" v="ghost" onClick={()=>setModalGroupe(false)}/><Btn ch="Créer le groupe" v="success" onClick={creerGroupe} disabled={!grpNom.trim()||grpMembres.length===0}/></div>
      </Modal>}
    </div>
  );
}

// ── UTILISATEURS ──────────────────────────────────────────────────────────────
function Utilisateurs({data,ops,currentUser}) {
  const [modal,setModal]=useState(null);const [form,setForm]=useState({nom:"",prenom:"",genre:"",identifiant:"",password:"",role:"Professeur",matieres_autorisees:[]});const [loading,setLoading]=useState(false);
  const toggleMat=id=>setForm(f=>({...f,matieres_autorisees:(f.matieres_autorisees||[]).includes(id)?f.matieres_autorisees.filter(x=>x!==id):[...(f.matieres_autorisees||[]),id]}));
  const save=async()=>{if(!form.nom||!form.identifiant)return;setLoading(true);const payload={nom:form.nom,prenom:form.prenom,genre:form.genre,identifiant:form.identifiant,role:form.role,matieres_autorisees:form.role==="Professeur"?(form.matieres_autorisees||[]):[]};if(modal==="add")await ops.addUser({...payload,password:form.password});else await ops.updateUser(modal,{...payload,...(form.password?{password:form.password}:{})});setLoading(false);setModal(null);};
  return(
    <div>
      <SHdr title="Utilisateurs 👤" sub="Gérez les accès" action={currentUser.role==="Administrateur"?<Btn ch="+ Nouvel utilisateur" v="primary" onClick={()=>{setForm({nom:"",prenom:"",genre:"",identifiant:"",password:"",role:"Professeur",matieres_autorisees:[]});setModal("add");}}/>:null}/>
      <Tbl cols={["Utilisateur","Identifiant","Rôle","Actions"]} empty={<Empty icon="👤" text="Aucun utilisateur."/>}
        rows={data.utilisateurs.map(u=>(
          <TR key={u.id}>
            <TD><div style={{display:"flex",alignItems:"center",gap:9}}><div style={{width:32,height:32,borderRadius:9,background:(ROLE_CLR[u.role]||"#6b7280")+"20",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:ROLE_CLR[u.role]||"#6b7280",fontSize:11}}>{u.prenom?.[0]}{u.nom[0]}</div><div style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>{u.prenom} {u.nom}</div></div></TD>
            <TD mono>{u.identifiant}</TD>
            <TD><Badge role={u.role}/></TD>
            <TD>{currentUser.role==="Administrateur"&&<div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setForm({nom:u.nom,prenom:u.prenom||"",genre:u.genre||"",identifiant:u.identifiant,password:"",role:u.role,matieres_autorisees:Array.isArray(u.matieres_autorisees)?u.matieres_autorisees:[]});setModal(u.id);}} style={{background:"#f1f5f9",border:"none",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:11,fontWeight:700}}>✏️</button>
              {u.id!==currentUser.id&&<button onClick={()=>ops.deleteUser(u.id)} style={{background:"#fef2f2",color:"#dc2626",border:"none",borderRadius:7,padding:"5px 9px",cursor:"pointer",fontSize:11,fontWeight:700}}>🗑️</button>}
            </div>}</TD>
          </TR>
        ))}
      />
      {modal&&<Modal title={modal==="add"?"Nouvel utilisateur":"Modifier"} onClose={()=>setModal(null)}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 13px"}}>
          <Inp label="Nom *" value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))}/>
          <Inp label="Prénom" value={form.prenom} onChange={e=>setForm(f=>({...f,prenom:e.target.value}))}/>
        </div>
        <Inp label="Identifiant *" value={form.identifiant} onChange={e=>setForm(f=>({...f,identifiant:e.target.value}))}/>
        <Slt label="Genre" value={form.genre} onChange={e=>setForm(f=>({...f,genre:e.target.value}))} opts={[{v:"",l:"— Choisir —"},{v:"M",l:"Masculin"},{v:"F",l:"Féminin"}]}/>
        <Lbl t={modal==="add"?"Mot de passe *":"Nouveau mot de passe"}><input type="password" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} style={iSt()}/></Lbl>
        <Slt label="Rôle" value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))} opts={["Administrateur","Directeur","Secrétaire","Professeur","Comptable"]}/>
        {form.role==="Professeur"&&<Lbl t="Matières enseignées (accès en saisie de notes)">
          {data.matieres.length===0?<div style={{fontSize:12,color:"#94a3b8"}}>Aucune matière créée.</div>:(
            <div style={{display:"flex",flexWrap:"wrap",gap:7,maxHeight:160,overflowY:"auto",padding:"2px"}}>
              {data.matieres.map(m=>{const on=(form.matieres_autorisees||[]).includes(m.id);return(
                <button key={m.id} type="button" onClick={()=>toggleMat(m.id)} style={{padding:"6px 12px",borderRadius:20,border:on?"2px solid #1a56db":"1.5px solid #e2e8f0",background:on?"#eff6ff":"#fff",color:on?"#1a56db":"#64748b",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{on?"✓ ":""}{m.nom}</button>
              );})}
            </div>
          )}
          <div style={{fontSize:11,color:"#94a3b8",marginTop:6}}>Le professeur ne pourra saisir que les notes des matières cochées.</div>
        </Lbl>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn ch="Annuler" v="ghost" onClick={()=>setModal(null)}/><Btn ch={loading?"...":"Enregistrer"} v="success" onClick={save} disabled={loading}/></div>
      </Modal>}
    </div>
  );
}

// ── NAV ───────────────────────────────────────────────────────────────────────
// ── PARAMÈTRES ÉTABLISSEMENT ──────────────────────────────────────────────────
function Parametres({etab,data,ops,onEtabUpdate}) {
  const [form,setForm]=useState({
    nom:etab.nom||"",devise_txt:etab.devise_txt||"",annee:etab.annee||"",devise:etab.devise||"GNF",
    systeme:etab.systeme||"trimestre",adresse:etab.adresse||"",telephone:etab.telephone||"",email:etab.email||"",
    codeMEN:etab.codeMEN||"",prefixe:etab.prefixe||"",fraisInscription:etab.fraisInscription||"",mensualite:etab.mensualite||"",
    pays:etab.pays||"République de Guinée",devise_nationale:etab.devise_nationale||"Travail · Justice · Solidarité",
    ministere:etab.ministere||"Ministère de l'Éducation Nationale et de l'Alphabétisation",ire:etab.ire||"",dpe:etab.dpe||"",dsee:etab.dsee||"",
    devise_mots:etab.devise_mots||{m1:"",c1:"#dc2626",m2:"",c2:"#d97706",m3:"",c3:"#059669"},
    langue:etab.langue||"fr",
    ar:etab.ar||{pays:"جمهورية غينيا",devise:"عمل · عدل · تضامن",ministere:"وزارة التعليم الوطني ومحو الأمية",ire:"",dpe:"",dsee:"",ecole:"",bulletin:"كشف الدرجات",recu:"وصل",classe:"القسم",eleve:"التلميذ",matricule:"رقم التسجيل",annee:"السنة الدراسية"},
    mode_paiement:etab.mode_paiement||"mensualite",nb_tranches:etab.nb_tranches||"3",mois_personnalises:etab.mois_personnalises||"",frais_annuel_defaut:etab.frais_annuel_defaut||"",
    mode_maternelle:etab.mode_maternelle||"note",
    entete_lignes:Array.isArray(etab.entete_lignes)?etab.entete_lignes:[],
    moyens_paiement:Array.isArray(etab.moyens_paiement)&&etab.moyens_paiement.length?etab.moyens_paiement:["Espèces","Orange Money","MoMo","Carte Visa","Chèque"],
    logo:etab.logo||"",logo2:etab.logo2||"",logo_disposition:etab.logo_disposition||"centre"
  });
  const [loading,setLoading]=useState(false);
  const [saved,setSaved]=useState(false);
  // Frais par classe (édition groupée)
  const [fraisClasses,setFraisClasses]=useState(()=>{
    const o={};(data?.classes||[]).forEach(c=>{o[c.id]={mensuel:c.mensualite_classe??"",annuel:c.frais_annuel_classe??"",insc:c.frais_inscription_classe??""};});return o;
  });
  const [savingFrais,setSavingFrais]=useState(false);
  const [fraisSaved,setFraisSaved]=useState(false);
  const save=async()=>{
    if(!form.nom)return;setLoading(true);
    const updated=await ops.updateEtab(etab.id,form);
    setLoading(false);
    if(updated){onEtabUpdate(updated);setSaved(true);setTimeout(()=>setSaved(false),2500);}
  };
  const saveFrais=async()=>{
    setSavingFrais(true);
    for(const c of (data?.classes||[])){

          </div>
        )}
        {(data?.classes||[]).length>0&&<div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:14,alignItems:"center"}}>
          {fraisSaved&&<span style={{color:"#059669",fontSize:12,fontWeight:700}}>✓ Frais enregistrés</span>}
          <Btn ch={savingFrais?"Enregistrement...":"💾 Enregistrer les frais"} v="success" onClick={saveFrais} disabled={savingFrais}/>
        </div>}
      </Card>
    </div>
  );
}

const NAV=[
  {id:"dashboard",l:"Tableau de bord",icon:"📊"},
  {id:"classes",l:"Classes",icon:"🏫"},
  {id:"matieres",l:"Matières",icon:"📖"},
  {id:"eleves",l:"Élèves",icon:"👨‍🎓",prof:true},
  {id:"professeurs",l:"Professeurs",icon:"👨‍🏫"},
  {id:"emploi",l:"Emploi du temps",icon:"🗓️",prof:true},
  {id:"notes",l:"Saisie des notes",icon:"📝",prof:true},
  {id:"bulletins",l:"Bulletins",icon:"📄"},
  {id:"fiche_notes",l:"Fiche de notes",icon:"🖨️"},
  {id:"paiements",l:"Paiements",icon:"💰"},
  {id:"presences",l:"Présences",icon:"📅",prof:true},
  {id:"messagerie",l:"Messagerie",icon:"💬",prof:true},
  {id:"utilisateurs",l:"Utilisateurs",icon:"👤"},
  {id:"parametres",l:"Établissement",icon:"⚙️"},
];
// Le rôle Professeur a un menu limité (entrées avec prof:true) + Tableau de bord
const navForRole=(role)=> role==="Professeur" ? NAV.filter(n=>n.prof||n.id==="dashboard") : NAV;

// ── APP PRINCIPALE ────────────────────────────────────────────────────────────
function CheckScreen({codeActivation,onResult}) {
  useEffect(()=>{
    let actif=true;
    sb.from("etablissements").select("*").eq("code_activation",codeActivation).maybeSingle()
      .then(({data:e})=>{if(actif)onResult(e||null);})
      .catch(()=>{if(actif)onResult(null);});
    return ()=>{actif=false;};
  },[]);
  return <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1a56db)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"#fff",fontSize:18,fontWeight:700}}>⏳ Chargement...</div></div>;
}

function MasterGate({onOk}) {
  const [pw,setPw]=useState("");const [err,setErr]=useState("");
  const go=()=>{ if(pw===MASTER_PASSWORD){onOk();} else setErr("Mot de passe maître incorrect."); };
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1a56db)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Plus Jakarta Sans',sans-serif",padding:16}}>
      <div style={{background:"#fff",borderRadius:22,padding:38,width:400,maxWidth:"100%",boxShadow:"0 32px 80px rgba(0,0,0,0.3)"}}>
        <div style={{textAlign:"center",marginBottom:22}}>
          <div style={{width:56,height:56,borderRadius:15,background:"#fef2f2",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 12px"}}>🔐</div>
          <h2 style={{margin:"0 0 3px",fontSize:19,fontWeight:900,color:"#0f172a"}}>Espace éditeur</h2>
          <p style={{margin:0,color:"#94a3b8",fontSize:12}}>Création d'une nouvelle école — accès réservé</p>
        </div>
        <Lbl t="Mot de passe maître"><input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} style={iSt()} placeholder="••••••••"/></Lbl>
        {err&&<div style={{background:"#fef2f2",borderRadius:9,padding:"9px 13px",color:"#dc2626",fontSize:12,marginBottom:12}}>{err}</div>}
        <Btn ch="Accéder →" v="primary" onClick={go} disabled={!pw} full/>
        <div style={{textAlign:"center",marginTop:14}}><a href="#" onClick={e=>{e.preventDefault();try{location.hash="";}catch(_){};location.reload();}} style={{color:"#94a3b8",fontSize:11,textDecoration:"none"}}>← Retour à la connexion</a></div>
      </div>
    </div>
  );
}

// Espace éditeur : configuration de la base + création d'école
function EditorHub({onCreate}) {
  const [cfgUrl,setCfgUrl]=useState("");const [cfgKey,setCfgKey]=useState("");
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1a56db)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Plus Jakarta Sans',sans-serif",padding:16}}>
      <div style={{background:"#fff",borderRadius:22,padding:34,width:480,maxWidth:"100%",boxShadow:"0 32px 80px rgba(0,0,0,0.3)",maxHeight:"92vh",overflow:"auto"}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{width:54,height:54,borderRadius:15,background:"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 12px"}}>🛠️</div>
          <h2 style={{margin:"0 0 3px",fontSize:19,fontWeight:900,color:"#0f172a"}}>Espace éditeur</h2>
          <p style={{margin:0,color:"#94a3b8",fontSize:12}}>Configurer une base et créer une nouvelle école</p>
        </div>

        <div style={{background:"#f8fafc",borderRadius:13,padding:16,marginBottom:16}}>
          <div style={{fontWeight:800,fontSize:13,color:"#0f172a",marginBottom:4}}>1️⃣ Base de données de l'école</div>
          <div style={{fontSize:11,color:"#64748b",marginBottom:12,lineHeight:1.5}}>Collez l'<b>URL</b> et la <b>clé anon</b> du projet Supabase de cette école. {SB_CONFIG.custom?<span style={{color:"#059669",fontWeight:700}}>✓ Base personnalisée active.</span>:<span style={{color:"#c2410c",fontWeight:700}}>Base de démonstration active.</span>}</div>
          <Inp label="URL du projet Supabase" value={cfgUrl} onChange={e=>setCfgUrl(e.target.value)} placeholder="https://xxxx.supabase.co"/>
          <Lbl t="Clé anon (public)"><textarea value={cfgKey} onChange={e=>setCfgKey(e.target.value)} style={{...iSt(),minHeight:54,resize:"vertical",fontFamily:"monospace",fontSize:10}} placeholder="eyJhbGc..."/></Lbl>
          <div style={{display:"flex",gap:8}}>
            <Btn ch="Enregistrer & recharger" v="success" s={{flex:1}} onClick={()=>{if(cfgUrl.trim()&&cfgKey.trim())saveSupabaseConfig(cfgUrl,cfgKey);}} disabled={!cfgUrl.trim()||!cfgKey.trim()}/>
            {SB_CONFIG.custom&&<Btn ch="Réinitialiser" v="ghost" onClick={resetSupabaseConfig}/>}
          </div>
        </div>

        <div style={{background:"#f8fafc",borderRadius:13,padding:16,marginBottom:14}}>
          <div style={{fontWeight:800,fontSize:13,color:"#0f172a",marginBottom:4}}>2️⃣ Créer l'école</div>
          <div style={{fontSize:11,color:"#64748b",marginBottom:12,lineHeight:1.5}}>Une fois la bonne base active ci-dessus, créez l'établissement et son compte administrateur.</div>
          <Btn ch="Créer une nouvelle école →" v="primary" onClick={onCreate} full/>
        </div>

        <div style={{textAlign:"center"}}><a href="#" onClick={e=>{e.preventDefault();try{location.hash="";}catch(_){};location.reload();}} style={{color:"#94a3b8",fontSize:11,textDecoration:"none"}}>← Retour à la connexion</a></div>
      </div>
    </div>
  );
}

function App() {
  // Mode création (éditeur) seulement si l'URL contient #admin-create
  const adminMode = isAdminCreateMode();
  const [screen,setScreen]=useState(adminMode?"master":"login");
  const [codeActivation,setCodeActivation]=useState("");
  const [currentUser,setCurrentUser]=useState(null);
  const [etab,setEtab]=useState(null);
  const [page,setPage]=useState("dashboard");

  const {data,syncStatus,toast,ops}=useSupabaseData(etab?.id);

  useEffect(()=>{const l=document.createElement("link");l.href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap";l.rel="stylesheet";document.head.appendChild(l);},[]);

  // Espace éditeur (création d'école) — protégé par mot de passe maître
  if(screen==="master") return <MasterGate onOk={()=>setScreen("editor")}/>;
  if(screen==="editor") return <EditorHub onCreate={()=>setScreen("activation")}/>;
  if(screen==="activation") return <ActivationScreen onDone={c=>{setCodeActivation(c);setScreen("check");}}/>;
  if(screen==="check") return <CheckScreen codeActivation={codeActivation} onResult={(e)=>{if(e){setEtab(e);setScreen("login");}else setScreen("onboarding");}}/>;
  if(screen==="onboarding") return <Onboarding codeActivation={codeActivation} onDone={(e,a)=>{setEtab(e);setCurrentUser(a);setScreen("app");}}/>;

  // Écran normal pour les écoles : connexion directe
  if(screen==="login") return <Login onLogin={(u,e)=>{setCurrentUser(u);setEtab(e||etab);setScreen("app");}}/>;

  // Sécurité : un professeur ne peut afficher que les pages autorisées
  const allowed=navForRole(currentUser?.role).map(n=>n.id);
  const safePage=allowed.includes(page)?page:"dashboard";

  const pages={
    dashboard:<Dashboard data={data} etab={etab||{}} setPage={setPage} currentUser={currentUser}/>,
    classes:<Classes data={data} ops={ops} etab={etab||{}}/>,
    matieres:<Matieres data={data} ops={ops}/>,
    eleves:<Eleves data={data} ops={ops} etab={etab||{}}/>,
    professeurs:<Professeurs data={data} ops={ops} etab={etab||{}}/>,
    emploi:<EmploiTemps data={data} ops={ops} etab={etab||{}} currentUser={currentUser}/>,
    notes:<Notes data={data} ops={ops} etab={etab||{}} currentUser={currentUser}/>,
    bulletins:<Bulletins data={data} etab={etab||{}}/>,
    fiche_notes:<FicheNotes data={data} ops={ops} etab={etab||{}} onEtabUpdate={setEtab}/>,
    paiements:<Paiements data={data} ops={ops} etab={etab||{}}/>,
    presences:<Presences data={data} ops={ops} etab={etab||{}}/>,
    messagerie:<Messagerie data={data} ops={ops} currentUser={currentUser}/>,
    utilisateurs:<Utilisateurs data={data} ops={ops} currentUser={currentUser}/>,
    parametres:<Parametres etab={etab||{}} data={data} ops={ops} onEtabUpdate={setEtab}/>,
  };

  return(
    <div style={{display:"flex",height:"100vh",fontFamily:"'Plus Jakarta Sans',sans-serif",background:"linear-gradient(135deg,#eef2f7 0%,#e8eef6 100%)"}}>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
      <div style={{width:214,background:"linear-gradient(180deg,#0f172a 0%,#13203a 100%)",display:"flex",flexDirection:"column",flexShrink:0,boxShadow:"2px 0 18px rgba(15,23,42,.18)"}}>
        <div style={{padding:"18px 13px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
          <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:11}}>
            <div style={{width:38,height:38,borderRadius:11,background:etab?.logo?"#fff":"linear-gradient(135deg,#1a56db,#1e40af)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,overflow:"hidden",border:etab?.logo?"1px solid rgba(255,255,255,0.15)":"none",boxShadow:"0 4px 12px -4px rgba(26,86,219,.6)"}}>{etab?.logo?<img src={etab.logo} alt="logo" style={{width:"100%",height:"100%",objectFit:"contain"}}/>:"🎓"}</div>
            <div><div style={{fontWeight:800,fontSize:16,color:"#fff",letterSpacing:-0.5,fontFamily:"'Sora',sans-serif"}}>MonEcole</div>{etab?.nom&&<div style={{fontSize:10,color:"rgba(255,255,255,0.55)",fontWeight:600,marginTop:1,lineHeight:1.2,maxWidth:135,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{etab.nom}</div>}</div>
          </div>
          <div style={{padding:"9px 11px",background:"rgba(255,255,255,0.06)",borderRadius:11,border:"1px solid rgba(255,255,255,0.07)",marginBottom:8}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.37)",marginBottom:1}}>Connecté</div>
            <div style={{fontSize:11,fontWeight:700,color:"#fff",marginBottom:3}}>{currentUser?.prenom} {currentUser?.nom}</div>
            <Badge role={currentUser?.role}/>
          </div>
          <div style={{display:"flex",justifyContent:"center"}}><SyncBadge status={syncStatus}/></div>
        </div>
        <nav style={{flex:1,padding:"8px 6px",overflowY:"auto"}}>
          {navForRole(currentUser?.role).map(n=>(
            <button key={n.id} className="me-nav" onClick={()=>setPage(n.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"9px 11px",borderRadius:10,border:"none",cursor:"pointer",textAlign:"left",marginBottom:2,background:page===n.id?"linear-gradient(135deg,#1a56db,#1e40af)":"transparent",color:page===n.id?"#fff":"rgba(255,255,255,0.5)",fontWeight:page===n.id?700:500,fontSize:11.5,fontFamily:"'Plus Jakarta Sans',sans-serif",boxShadow:page===n.id?"0 4px 12px -4px rgba(26,86,219,.6)":"none"}}
              onMouseOver={e=>{if(page!==n.id){e.currentTarget.style.background="rgba(255,255,255,0.06)";e.currentTarget.style.color="rgba(255,255,255,0.8)";}}}
              onMouseOut={e=>{if(page!==n.id){e.currentTarget.style.background="transparent";e.currentTarget.style.color="rgba(255,255,255,0.5)";}}}>
              <span style={{fontSize:15}}>{n.icon}</span>{n.l}
            </button>
          ))}
        </nav>
        <div style={{padding:"10px 6px",borderTop:"1px solid rgba(255,255,255,0.07)"}}>
          <button className="me-btn" onClick={()=>{setCurrentUser(null);setScreen("login");}} style={{width:"100%",background:"rgba(239,68,68,0.13)",color:"#fca5a5",border:"1px solid rgba(239,68,68,0.17)",borderRadius:9,padding:"8px",cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>🚪 Déconnexion</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"26px 28px"}}><div key={safePage} className="me-page">{pages[safePage]}</div></div>
    </div>
  );
}

const _rootEl = document.getElementById("root");
if (ReactDOM.createRoot) {
  ReactDOM.createRoot(_rootEl).render(React.createElement(App));
} else {
  ReactDOM.render(React.createElement(App), _rootEl);
}
</script>
</body>
</html>
